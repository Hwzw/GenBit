<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deoxyer Terminal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #terminal {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      padding-bottom: 0;
    }
    .line { white-space: pre-wrap; word-wrap: break-word; line-height: 1.5; }
    .line.error { color: #f85149; }
    .line.success { color: #3fb950; }
    .line.info { color: #58a6ff; }
    .line.dim { color: #6e7681; }
    .line.bold { color: #f0f6fc; font-weight: bold; }
    .line.warn { color: #d29922; }
    .codon-a { color: #79c0ff; }
    .codon-b { color: #d2a8ff; }
    .codon-c { color: #7ee787; }
    /* Per-CDS palettes: 3 lightness shades of one hue per CDS.
       Shades distinguish reading-frame codons within a CDS;
       hues distinguish adjacent CDSes. */
    .codon-p0-a { color: #a8d8ff; } .codon-p0-b { color: #79c0ff; } .codon-p0-c { color: #4a9bff; }
    .codon-p1-a { color: #e4c3ff; } .codon-p1-b { color: #d2a8ff; } .codon-p1-c { color: #b27de8; }
    .codon-p2-a { color: #a8f0b1; } .codon-p2-b { color: #7ee787; } .codon-p2-c { color: #4fcb5d; }
    .codon-p3-a { color: #ffcda0; } .codon-p3-b { color: #ffa657; } .codon-p3-c { color: #e88530; }
    .codon-p4-a { color: #ffbdd9; } .codon-p4-b { color: #ff93bc; } .codon-p4-c { color: #e46a96; }
    .codon-p5-a { color: #a8e8ed; } .codon-p5-b { color: #76e3ea; } .codon-p5-c { color: #40bdc6; }
    .codon-start { color: #f85149; font-weight: bold; }
    .codon-stop { color: #f85149; font-weight: bold; }
    .seq-noncds { color: #8b949e; }
    .seq-promoter { color: #6e7681; }
    .seq-kozak { color: #9e8a6e; }
    .seq-terminator { color: #7a6e81; }
    .digest-cut { color: #f85149; font-weight: bold; }
    .clickable-id {
      text-decoration: underline;
      text-decoration-style: dotted;
      cursor: pointer;
      color: #58a6ff;
    }
    .clickable-id:hover { color: #79c0ff; text-decoration-style: solid; }
    .ws-insert-cell {
      display: inline-block;
      width: 3ch;
      text-align: left;
    }
    .ws-insert-btn {
      display: inline-block;
      width: 2ch;
      text-align: center;
      cursor: pointer;
      color: #6e7681;
      border: 1px solid #30363d;
      border-radius: 3px;
      background: transparent;
      font-family: inherit;
      font-size: inherit;
      line-height: 1;
      padding: 0;
      user-select: none;
    }
    .ws-insert-btn:hover { color: #3fb950; border-color: #3fb950; }
    #input-area {
      display: flex;
      align-items: center;
      padding: 8px 16px 16px;
      gap: 8px;
    }
    #input-area .prompt { color: #3fb950; font-weight: bold; white-space: nowrap; max-width: 40%; overflow: hidden; text-overflow: ellipsis; }
    #input-area input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #c9d1d9;
      font-family: inherit;
      font-size: inherit;
      caret-color: #3fb950;
    }
    #status-bar {
      display: flex;
      justify-content: space-between;
      padding: 4px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      font-size: 12px;
      color: #8b949e;
      flex-shrink: 0;
    }
    #status-bar span {
      white-space: nowrap;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #status-bar .active { color: #3fb950; }
  </style>
</head>
<body>
  <div id="status-bar">
    <span id="sb-project">Project: none</span>
    <span id="sb-construct">Construct: none</span>
    <span id="sb-workspace">Workspace: 0 items</span>
  </div>
  <div id="terminal"></div>
  <div id="input-area">
    <span class="prompt">deoxyer&gt;</span>
    <input type="text" id="cmd" autofocus autocomplete="off" spellcheck="false">
  </div>

  <script>
    function getSessionId() {
      let sid = localStorage.getItem('genbit-session-id');
      if (!sid) {
        sid = crypto.randomUUID();
        localStorage.setItem('genbit-session-id', sid);
      }
      return sid;
    }

    const state = {
      baseUrl: window.location.origin || 'http://localhost:8000',
      history: [],
      historyIndex: -1,
      workspace: {},
      sessionId: getSessionId(),
      activeProject: null,   // { id, name }
      activeConstruct: null,  // { id, name }
      pendingConfirm: null,  // { action: async function }
    };

    const termEl = document.getElementById('terminal');
    const cmdEl = document.getElementById('cmd');

    // ── Output helpers ──────────────────────────────────────────────
    function print(text, cls = '') {
      const div = document.createElement('div');
      div.className = 'line' + (cls ? ' ' + cls : '');
      div.textContent = text;
      termEl.appendChild(div);
      termEl.scrollTop = termEl.scrollHeight;
    }

    function printJson(obj) {
      print(JSON.stringify(obj, null, 2));
    }


    function printTable(rows, columns, clickable, insertCol) {
      if (!rows || rows.length === 0) { print('No results.', 'dim'); return; }
      const widths = {};
      columns.forEach(c => widths[c] = c.length);
      rows.forEach(r => columns.forEach(c => {
        const val = String(r[c] ?? '');
        if (val.length > widths[c]) widths[c] = Math.min(val.length, 60);
      }));
      const insWidth = 3;
      const insPrefix = insertCol ? ' '.repeat(insWidth) + '  ' : '';
      const insSepPrefix = insertCol ? '─'.repeat(insWidth) + '──' : '';
      const header = insPrefix + columns.map(c => c.padEnd(widths[c])).join('  ');
      const sep = insSepPrefix + columns.map(c => '─'.repeat(widths[c])).join('──');
      print(header, 'bold');
      print(sep, 'dim');
      rows.forEach(r => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'line';
        if (insertCol) {
          const cell = document.createElement('span');
          cell.className = 'ws-insert-cell';
          const insertValue = String(r[insertCol] ?? '');
          if (insertValue) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'ws-insert-btn';
            btn.textContent = '+';
            btn.setAttribute('aria-label', `Insert ${insertValue}`);
            btn.title = `Insert ${insertValue}`;
            btn.addEventListener('click', () => appendWsToCmd(insertValue));
            cell.appendChild(btn);
          }
          rowDiv.appendChild(cell);
          rowDiv.appendChild(document.createTextNode('  '));
        }
        columns.forEach((c, i) => {
          if (i > 0) rowDiv.appendChild(document.createTextNode('  '));
          const raw = String(r[c] ?? '').substring(0, 60);
          const padded = raw.padEnd(widths[c]);
          const tmpl = clickable && clickable[c];
          if (tmpl && raw) {
            const span = document.createElement('span');
            span.className = 'clickable-id';
            span.textContent = raw;
            span.addEventListener('click', () => {
              cmdEl.value = tmpl.replace('<id>', raw);
              cmdEl.focus();
              cmdEl.setSelectionRange(cmdEl.value.length, cmdEl.value.length);
            });
            rowDiv.appendChild(span);
            const pad = padded.length - raw.length;
            if (pad > 0) rowDiv.appendChild(document.createTextNode(' '.repeat(pad)));
          } else {
            rowDiv.appendChild(document.createTextNode(padded));
          }
        });
        termEl.appendChild(rowDiv);
      });
      termEl.scrollTop = termEl.scrollHeight;
    }

    function printSeq(seq, label) {
      if (label) print(label + ':', 'info');
      for (let i = 0; i < seq.length; i += 80) {
        print(seq.substring(i, i + 80));
      }
    }

    const STOP_CODONS = new Set(['TAA', 'TAG', 'TGA']);
    // Each CDS cycles through its own 3-shade palette; adjacent CDSes get different hues.
    const CDS_PALETTES = [
      ['codon-p0-a', 'codon-p0-b', 'codon-p0-c'],
      ['codon-p1-a', 'codon-p1-b', 'codon-p1-c'],
      ['codon-p2-a', 'codon-p2-b', 'codon-p2-c'],
      ['codon-p3-a', 'codon-p3-b', 'codon-p3-c'],
      ['codon-p4-a', 'codon-p4-b', 'codon-p4-c'],
      ['codon-p5-a', 'codon-p5-b', 'codon-p5-c'],
    ];

    /**
     * Print a sequence with codon color-coding.
     * If annotations are provided, only CDS regions get codon coloring;
     * non-CDS regions (promoter, kozak, terminator) render in gray.
     * Without annotations, the entire sequence is treated as coding.
     */
    function printCodons(seq, label, annotations, cutPositions) {
      if (label) print(label + ':', 'info');
      const upper = seq.toUpperCase();

      // Map element type to CSS class
      const REGION_CLASSES = {
        promoter: 'seq-promoter',
        kozak: 'seq-kozak',
        terminator: 'seq-terminator',
        stop_codon: 'codon-stop',
      };

      // Find the annotation at a given position
      function annotationAt(pos) {
        if (!annotations || !annotations.length) return null;
        for (const a of annotations) {
          if (pos >= a.start && pos < a.end) return a;
        }
        return null;
      }

      // Assign a palette index to each CDS annotation (by order of appearance)
      const cdsPaletteIdx = new Map();
      if (annotations) {
        let n = 0;
        for (const a of annotations) {
          if (a.type === 'cds') cdsPaletteIdx.set(a, n++);
        }
      }

      // Build spans: CDS regions get codon coloring, others get subtle type-based color
      const spans = [];
      let i = 0;
      while (i < upper.length) {
        const ann = annotationAt(i);
        const isCds = ann ? ann.type === 'cds' : (!annotations || !annotations.length);

        if (isCds) {
          // Find CDS start for reading frame alignment
          const cdsStart = ann ? ann.start : 0;
          const frameOffset = (i - cdsStart) % 3;
          const codonStart = i - frameOffset;
          const codonIdx = Math.floor((i - cdsStart) / 3);
          const end = Math.min(codonStart + 3, upper.length);
          const codonText = upper.substring(codonStart, end);
          if (frameOffset === 0) {
            const palette = CDS_PALETTES[(cdsPaletteIdx.get(ann) || 0) % CDS_PALETTES.length];
            let cls;
            if (codonIdx === 0 && codonText === 'ATG') {
              cls = 'codon-start';
            } else if (STOP_CODONS.has(codonText)) {
              cls = 'codon-stop';
            } else {
              cls = palette[codonIdx % 3];
            }
            spans.push({ text: codonText, cls, pos: codonStart });
          }
          i = end;
        } else {
          // Non-CDS: collect chars that share the same annotation
          const cls = (ann && REGION_CLASSES[ann.type]) || 'seq-noncds';
          const regionEnd = ann ? ann.end : upper.length;
          let j = Math.min(regionEnd, upper.length);
          spans.push({ text: upper.substring(i, j), cls, pos: i });
          i = j;
        }
      }

      // Overlay cut bars by splitting spans at each cut position
      if (cutPositions && cutPositions.length) {
        const sorted = Array.from(new Set(cutPositions))
          .filter(c => c >= 0 && c <= upper.length)
          .sort((a, b) => a - b);
        const out = [];
        let cutIdx = 0;
        for (const s of spans) {
          let text = s.text;
          let pos = s.pos;
          while (cutIdx < sorted.length && sorted[cutIdx] < pos + text.length) {
            const cut = sorted[cutIdx];
            if (cut <= pos) {
              if (cut === pos) out.push({ text: '│', cls: 'digest-cut' });
              cutIdx++;
              continue;
            }
            const splitAt = cut - pos;
            out.push({ text: text.substring(0, splitAt), cls: s.cls });
            out.push({ text: '│', cls: 'digest-cut' });
            text = text.substring(splitAt);
            pos = cut;
            cutIdx++;
          }
          if (text.length > 0) out.push({ text, cls: s.cls });
        }
        while (cutIdx < sorted.length && sorted[cutIdx] === upper.length) {
          out.push({ text: '│', cls: 'digest-cut' });
          cutIdx++;
        }
        spans.length = 0;
        for (const s of out) spans.push(s);
      }

      // Render spans into lines of ~80 chars
      const charsPerLine = 80;
      let lineDiv = document.createElement('div');
      lineDiv.className = 'line';
      let lineLen = 0;

      for (const s of spans) {
        let text = s.text;
        while (text.length > 0) {
          const room = charsPerLine - lineLen;
          if (text.length <= room) {
            const span = document.createElement('span');
            span.className = s.cls;
            span.textContent = text;
            lineDiv.appendChild(span);
            lineLen += text.length;
            text = '';
          } else {
            // Split at line boundary
            const span = document.createElement('span');
            span.className = s.cls;
            span.textContent = text.substring(0, room);
            lineDiv.appendChild(span);
            text = text.substring(room);
            termEl.appendChild(lineDiv);
            lineDiv = document.createElement('div');
            lineDiv.className = 'line';
            lineLen = 0;
          }
        }
      }
      if (lineLen > 0) termEl.appendChild(lineDiv);
      termEl.scrollTop = termEl.scrollHeight;
    }

    // Benchling-style in-series diagram. Arrow widths scale with log(length)
    // so short features are not dwarfed by a CDS an order of magnitude longer.
    function buildDiagramCells(annotations, options) {
      const scale = (options && options.scale) || 1;
      const flat = !!(options && options.flat);
      const NON_CDS_CLASSES = {
        promoter: 'seq-promoter',
        kozak: 'seq-kozak',
        terminator: 'seq-terminator',
        stop_codon: 'codon-stop',
      };
      const K = 3;
      const MIN_W = Math.max(2, Math.round(4 * scale));
      const MAX_W = Math.max(MIN_W, Math.round(60 * scale));
      let cdsSeen = 0;
      let colOffset = 0;
      return annotations.map(a => {
        const len = Math.max(2, a.length || (a.end - a.start));
        const raw = Math.round(Math.log(len) * K * scale);
        const w = Math.max(MIN_W, Math.min(MAX_W, raw));
        let arrow;
        if (a.type === 'terminator') arrow = '━'.repeat(w - 1) + '┫';
        else if (a.type === 'promoter') arrow = '┗' + '━'.repeat(w - 2) + '▶';
        else if (flat) arrow = '━'.repeat(w);
        else if (a.type === 'kozak') arrow = '━'.repeat(w - 1) + '▷';
        else arrow = '━'.repeat(w - 1) + '▶';
        let cls;
        if (a.type === 'cds') {
          cls = CDS_PALETTES[cdsSeen % CDS_PALETTES.length][1];
          cdsSeen++;
        } else {
          cls = NON_CDS_CLASSES[a.type] || '';
        }
        const bpLen = a.length || (a.end - a.start);
        const cell = {
          w,
          arrow,
          name: a.label || a.type || '',
          bp: bpLen + ' bp',
          cls,
          start: a.start,
          end: a.end,
          length: bpLen,
          colStart: colOffset,
        };
        colOffset += w;
        return cell;
      });
    }

    function printConstructDiagram(annotations) {
      if (!annotations || !annotations.length) return;
      const cells = buildDiagramCells(annotations);

      const center = (text, w) => {
        if (text.length > w) return text.substring(0, Math.max(0, w - 1)) + '…';
        const pad = w - text.length;
        const left = Math.floor(pad / 2);
        return ' '.repeat(left) + text + ' '.repeat(pad - left);
      };

      const nameDiv = document.createElement('div');
      nameDiv.className = 'line dim';
      nameDiv.textContent = '  ' + cells.map(c => center(c.name, c.w)).join('');
      termEl.appendChild(nameDiv);

      const arrowDiv = document.createElement('div');
      arrowDiv.className = 'line';
      arrowDiv.appendChild(document.createTextNode('  '));
      cells.forEach(c => {
        const span = document.createElement('span');
        if (c.cls) span.className = c.cls;
        span.textContent = c.arrow;
        arrowDiv.appendChild(span);
      });
      termEl.appendChild(arrowDiv);

      const bpDiv = document.createElement('div');
      bpDiv.className = 'line dim';
      bpDiv.textContent = '  ' + cells.map(c => center(c.bp, c.w)).join('');
      termEl.appendChild(bpDiv);

      termEl.scrollTop = termEl.scrollHeight;
    }

    // Render the construct arrow diagram once per enzyme, with a vertical bar
    // overlaid at each cut site and the bp position labelled below.
    function printDigestDiagram(enzymeInfos, annotations, sequenceLength) {
      const effectiveAnnotations = (annotations && annotations.length)
        ? annotations
        : [{ type: 'custom', start: 0, end: sequenceLength, length: sequenceLength, label: '' }];
      const cells = buildDiagramCells(effectiveAnnotations, { scale: 0.5, flat: true });
      const totalWidth = cells.reduce((s, c) => s + c.w, 0);

      function bpToCol(bp) {
        for (const c of cells) {
          if (bp >= c.start && bp < c.end) {
            const frac = c.length > 0 ? (bp - c.start) / c.length : 0;
            return c.colStart + Math.min(c.w - 1, Math.floor(frac * c.w));
          }
        }
        return totalWidth - 1;
      }

      enzymeInfos.forEach((e, idx) => {
        if (idx > 0) print('');
        const cutCount = e.cut_count != null ? e.cut_count : (e.cut_positions ? e.cut_positions.length : 0);
        const meta = `${e.site}, ${e.overhang}`;
        if (cutCount === 0) {
          print(`${e.name} (${meta}): No cuts`, 'dim');
          return;
        }
        print(`${e.name} (${meta}): ${cutCount} cut${cutCount === 1 ? '' : 's'}`, 'info');

        const colChar = new Array(totalWidth).fill(' ');
        const colClass = new Array(totalWidth).fill('');
        for (const c of cells) {
          for (let i = 0; i < c.w; i++) {
            colChar[c.colStart + i] = c.arrow[i] || '━';
            colClass[c.colStart + i] = c.cls || '';
          }
        }

        const cuts = [...e.cut_positions].sort((a, b) => a - b);
        const barCols = cuts.map(bpToCol);
        for (const col of barCols) {
          if (col >= 0 && col < totalWidth) {
            colChar[col] = '│';
            colClass[col] = 'digest-cut';
          }
        }

        const arrowDiv = document.createElement('div');
        arrowDiv.className = 'line';
        arrowDiv.appendChild(document.createTextNode('  '));
        let i = 0;
        while (i < totalWidth) {
          let j = i;
          while (j < totalWidth && colClass[j] === colClass[i]) j++;
          const span = document.createElement('span');
          if (colClass[i]) span.className = colClass[i];
          span.textContent = colChar.slice(i, j).join('');
          arrowDiv.appendChild(span);
          i = j;
        }
        termEl.appendChild(arrowDiv);

        const labelRow = new Array(totalWidth + 16).fill(' ');
        let cursor = 0;
        for (let k = 0; k < barCols.length; k++) {
          const label = String(cuts[k] + 1);
          let start = barCols[k];
          if (start < cursor) start = cursor;
          for (let m = 0; m < label.length; m++) {
            if (start + m < labelRow.length) labelRow[start + m] = label[m];
          }
          cursor = start + label.length + 1;
        }
        const bpDiv = document.createElement('div');
        bpDiv.className = 'line dim';
        bpDiv.textContent = '  ' + labelRow.join('').replace(/\s+$/, '');
        termEl.appendChild(bpDiv);
      });

      termEl.scrollTop = termEl.scrollHeight;
    }

    // ── UI refresh helpers ──────────────────────────────────────────
    function truncName(name, max) {
      return name.length > max ? name.substring(0, max - 1) + '…' : name;
    }

    function updateStatusBar() {
      const p = state.activeProject;
      const c = state.activeConstruct;
      const wsCount = Object.keys(state.workspace).length;
      const sbP = document.getElementById('sb-project');
      const sbC = document.getElementById('sb-construct');
      const sbW = document.getElementById('sb-workspace');
      sbP.textContent = p ? `Project: ${truncName(p.name, 20)}` : 'Project: none';
      sbP.className = p ? 'active' : '';
      sbC.textContent = c ? `Construct: ${truncName(c.name, 20)}` : 'Construct: none';
      sbC.className = c ? 'active' : '';
      sbW.textContent = `Workspace: ${wsCount} item${wsCount !== 1 ? 's' : ''}`;
    }

    function updatePrompt() {
      const parts = ['deoxyer'];
      if (state.activeProject) parts.push(truncName(state.activeProject.name, 20));
      if (state.activeConstruct) parts.push(truncName(state.activeConstruct.name, 20));
      document.querySelector('#input-area .prompt').textContent = parts.join('/') + '>';
    }

    function refreshUI() {
      updateStatusBar();
      updatePrompt();
    }

    // ── Workspace helpers ───────────────────────────────────────────
    function wsStore(name, obj) {
      state.workspace[name] = obj;
      refreshUI();
    }

    function wsGet(name) {
      return state.workspace[name] || null;
    }

    function wsUnit(type) {
      return (type === 'protein') ? 'aa' : 'bp';
    }

    // ── API helper ──────────────────────────────────────────────────
    async function api(method, path, body) {
      const url = state.baseUrl + path;
      const opts = { method, headers: { 'Content-Type': 'application/json', 'X-Session-ID': state.sessionId } };
      if (body) opts.body = JSON.stringify(body);
      try {
        const res = await fetch(url, opts);
        const data = await res.json().catch(() => null);
        if (!res.ok) {
          const raw = data?.detail || `HTTP ${res.status}`;
          const detail = typeof raw === 'string' ? raw : JSON.stringify(raw);
          throw new Error(detail);
        }
        return data;
      } catch (e) {
        if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
          throw new Error(`Connection failed. Is the backend running at ${state.baseUrl}?`);
        }
        throw e;
      }
    }

    // ── Command parser ──────────────────────────────────────────────
    function parseCommand(input) {
      const tokens = [];
      let current = '';
      let inQuote = false;
      let quoteChar = '';
      for (const ch of input) {
        if (inQuote) {
          if (ch === quoteChar) { inQuote = false; } else { current += ch; }
        } else if (ch === '"' || ch === "'") {
          inQuote = true; quoteChar = ch;
        } else if (ch === ' ') {
          if (current) { tokens.push(current); current = ''; }
        } else {
          current += ch;
        }
      }
      if (current) tokens.push(current);

      const args = [];
      const flags = {};
      for (const t of tokens) {
        if (t.startsWith('--')) {
          const eq = t.indexOf('=');
          if (eq > -1) {
            flags[t.substring(2, eq)] = t.substring(eq + 1);
          } else {
            flags[t.substring(2)] = true;
          }
        } else {
          args.push(t);
        }
      }
      return { args, flags };
    }

    // ── Command handlers ────────────────────────────────────────────

    async function handleGene(args, flags) {
      const verb = args[0];
      if (verb === 'search') {
        const q = args.slice(1).join(' ');
        if (!q) { print('Usage: gene search <query> [--organism=X]', 'warn'); return; }
        let path = `/api/genes/search?q=${encodeURIComponent(q)}`;
        if (flags.organism) path += `&organism=${encodeURIComponent(flags.organism)}`;
        const data = await api('GET', path);
        if (flags.json) { printJson(data); return; }
        printTable(data, ['gene_id', 'symbol', 'description', 'organism'], null, 'gene_id');
      } else if (verb === 'get') {
        if (!args[1]) { print('Usage: gene get <gene_id>', 'warn'); return; }
        const data = await api('GET', `/api/genes/${args[1]}`);
        if (flags.json) { printJson(data); return; }
        print(`Gene ID: ${data.gene_id}`, 'bold');
        if (data.symbol) print(`Symbol: ${data.symbol}`);
        if (data.full_name) print(`Full name: ${data.full_name}`);
        if (data.description) print(`Description: ${data.description}`);
        if (data.organism) print(`Organism: ${data.organism}${data.tax_id ? ` (tax ${data.tax_id})` : ''}`);
        if (data.chromosome) print(`Chromosome: ${data.chromosome}`, 'dim');
        if (data.map_location) print(`Map location: ${data.map_location}`, 'dim');
        if (data.aliases && data.aliases.length) print(`Aliases: ${data.aliases.join(', ')}`, 'dim');
      } else if (verb === 'sequence') {
        if (!args[1]) { print('Usage: gene sequence <gene_id> [--type=cds|mrna] [--name=X] [--seq]', 'warn'); return; }
        const geneId = args[1];
        const seqType = flags.type || 'cds';
        let path = `/api/genes/${geneId}/sequence`;
        if (flags.type) path += `?seq_type=${flags.type}`;
        const data = await api('GET', path);

        // Auto-name: try symbol from accession or fall back to gene-{id}-{type}
        const autoName = flags.name || (data.symbol ? `${data.symbol}-${seqType}` : `gene-${geneId}-${seqType}`);
        const wsObj = {
          type: 'dna',
          sequence: data.sequence,
          length: data.length || data.sequence.length,
          source: 'ncbi-gene',
          label: `Gene ${geneId} ${seqType.toUpperCase()}`,
          accession: data.accession || null,
        };
        wsStore(autoName, wsObj);
        if (flags.json) { printJson({ workspace_name: autoName, ...wsObj }); return; }
        print(`Saved as '${autoName}' (${data.sequence.length} bp, ${seqType.toUpperCase()})`, 'success');
        if (data.accession) print(`Accession: ${data.accession}`, 'dim');
        if (flags.seq) {
          print('');
          printSeq(data.sequence);
        }
      } else {
        print('Usage: gene search|get|sequence ...', 'warn');
      }
    }

    async function handleProtein(args, flags) {
      const verb = args[0];
      if (verb === 'search') {
        const q = args.slice(1).join(' ');
        if (!q) { print('Usage: protein search <query> [--organism=X]', 'warn'); return; }
        let path = `/api/proteins/search?q=${encodeURIComponent(q)}`;
        if (flags.organism) path += `&organism=${encodeURIComponent(flags.organism)}`;
        const data = await api('GET', path);
        if (flags.json) { printJson(data); return; }
        printTable(data, ['accession', 'name', 'organism', 'length', 'source'], null, 'accession');
      } else if (verb === 'get') {
        const accessions = args.slice(1);
        if (accessions.length === 0) {
          print('Usage: protein get <accession> [<accession> ...] [--name=X] [--seq]', 'warn');
          return;
        }
        if (flags.name && accessions.length > 1) {
          print('--name can only be used with a single accession.', 'warn');
          return;
        }
        const results = [];
        for (const accession of accessions) {
          try {
            const data = await api('GET', `/api/proteins/${accession}/sequence`);
            const name = (accessions.length === 1 && flags.name) ? flags.name : accession;
            const wsObj = {
              type: 'protein',
              sequence: data.sequence,
              length: data.length || data.sequence.length,
              source: data.source || 'uniprot',
              label: data.name || accession,
              accession: data.accession || accession,
            };
            wsStore(name, wsObj);
            results.push({ accession, name, wsObj, data, ok: true });
            if (!flags.json) {
              const labelPart = data.name ? `, ${data.name}` : '';
              print(`Saved as '${name}' (${data.sequence.length} aa${labelPart})`, 'success');
              if (flags.seq) {
                print('');
                printSeq(data.sequence);
                print('');
              }
            }
          } catch (e) {
            results.push({ accession, ok: false, error: e.message });
            if (!flags.json) print(`Failed '${accession}': ${e.message}`, 'error');
          }
        }
        if (flags.json) {
          printJson(results.map(r => r.ok
            ? { workspace_name: r.name, ...r.wsObj }
            : { accession: r.accession, error: r.error }));
        }
      } else {
        print('Usage: protein search|get ...', 'warn');
      }
    }

    async function handleOptimize(args, flags) {
      let refs, organism;
      if (flags.organism) {
        organism = flags.organism;
        refs = args.slice();
      } else if (args.length >= 2) {
        organism = args[args.length - 1];
        refs = args.slice(0, -1);
      } else {
        refs = args.slice();
        organism = undefined;
      }

      if (refs.length === 0 || !organism) {
        print('Usage: optimize <name|accession> [<name|accession> ...] <tax_id>', 'warn');
        print('');
        print('Required:', 'info');
        print('  <name|accession>     Workspace name(s) or UniProt accession(s) (e.g. P04637)');
        print('  <tax_id>             Target organism tax ID (e.g. 9606=human, 4932=yeast)');
        print('                       Also accepts --organism=<tax_id>');
        print('');
        print('Optional:', 'info');
        print('  --strategy=<s>       Optimization strategy:');
        print('      frequency    Most-used codons in target organism (default, good general choice)');
        print('      harmonized   Matches codon usage ratios from source organism');
        print('      balanced     Balances frequency with secondary structure avoidance');
        print('  --gc-min=<0-1>       Minimum GC content (typical: 0.3–0.4)');
        print('  --gc-max=<0-1>       Maximum GC content (typical: 0.6–0.7)');
        print('  --avoid=<sites>      Restriction sites to avoid, comma-separated');
        print('                       Common: EcoRI,BamHI,HindIII,NotI,XhoI');
        print('  --allow-repeats      Allow sequence repeats (default: repeats are removed)');
        print('  --name=<X>           Custom name for result (single protein only; default: <input>-opt)');
        print('  --seq                Print the optimized sequence');
        print('');
        print('Example: optimize P04637 9606 --strategy=frequency --avoid=EcoRI,BamHI', 'dim');
        print('Example: optimize P68871 P02042 P02100 4932', 'dim');
        return;
      }

      if (flags.name && refs.length > 1) {
        print('--name can only be used with a single protein.', 'warn');
        return;
      }

      const results = [];
      for (const ref of refs) {
        try {
          let proteinSeq = null;
          const wsObj = wsGet(ref);
          if (wsObj) {
            if (wsObj.type !== 'protein') {
              throw new Error(`'${ref}' is a ${wsObj.type} sequence, not a protein. Optimization requires a protein sequence.`);
            }
            proteinSeq = wsObj.sequence;
            if (!flags.json) print(`Using '${ref}' from workspace (${wsObj.length} aa)`, 'dim');
          } else {
            if (!flags.json) print(`'${ref}' not in workspace. Fetching protein sequence...`, 'dim');
            let pdata;
            try {
              pdata = await api('GET', `/api/proteins/${ref}/sequence`);
            } catch (e) {
              throw new Error(`Could not fetch protein '${ref}': ${e.message}`);
            }
            proteinSeq = pdata.sequence;
            wsStore(ref, {
              type: 'protein',
              sequence: pdata.sequence,
              length: pdata.sequence.length,
              source: pdata.source || 'uniprot',
              label: pdata.name || ref,
              accession: pdata.accession || ref,
            });
            if (!flags.json) print(`Fetched and saved protein as '${ref}' (${pdata.sequence.length} aa)`, 'success');
          }

          const body = {
            sequence: proteinSeq,
            organism_tax_id: parseInt(organism),
            strategy: flags.strategy || 'frequency',
            avoid_restriction_sites: flags.avoid ? flags.avoid.split(',') : [],
            avoid_repeats: flags['allow-repeats'] !== undefined ? false : true,
          };
          if (flags['gc-min']) body.target_gc_min = parseFloat(flags['gc-min']);
          if (flags['gc-max']) body.target_gc_max = parseFloat(flags['gc-max']);

          if (!flags.json) print(refs.length > 1 ? `Optimizing '${ref}'...` : 'Optimizing...', 'dim');
          const data = await api('POST', '/api/optimization/optimize', body);

          const resultName = (refs.length === 1 && flags.name) ? flags.name : `${ref}-opt`;
          const optSeq = data.optimized_sequence || '';
          const optObj = {
            type: 'dna',
            sequence: optSeq,
            length: optSeq.length,
            source: 'optimized',
            label: `${ref} optimized for ${organism}`,
            cai_before: data.cai_before,
            cai_after: data.cai_after,
            gc_content: data.gc_content,
            job_id: data.job_id,
          };
          wsStore(resultName, optObj);
          results.push({ ref, resultName, optObj, data, ok: true });

          if (!flags.json) {
            let summary = `Saved as '${resultName}' (${optSeq.length} bp`;
            if (data.cai_before != null) summary += `, CAI: ${data.cai_before} → ${data.cai_after}`;
            if (data.gc_content != null) summary += `, GC: ${(data.gc_content * 100).toFixed(1)}%`;
            summary += ')';
            print(summary, 'success');
            if (flags.seq && optSeq) {
              print('');
              printCodons(optSeq);
              print('');
            }
          }
        } catch (e) {
          results.push({ ref, ok: false, error: e.message });
          if (!flags.json) print(`Failed '${ref}': ${e.message}`, 'error');
        }
      }

      if (flags.json) {
        printJson(results.map(r => r.ok
          ? { workspace_name: r.resultName, ...r.optObj, ...r.data }
          : { ref: r.ref, error: r.error }));
      }
    }

    async function handleKozak(args, flags) {
      const arg = args[0];
      if (!arg) {
        print('Usage: kozak <tax_id|clade> [--start=ATG] [--name=X]', 'warn');
        print('  Clade aliases: vertebrate, plant, fly, yeast, algae, slimemold,', 'dim');
        print('                 ciliate, malaria, toxoplasma, trypanosome, ecoli', 'dim');
        return;
      }
      if (arg === 'list') {
        const data = await api('GET', '/api/regulatory/kozak/clades');
        if (flags.json) { printJson(data); return; }
        print('Available Kozak clades:', 'info');
        data.clades.forEach(c => print('  ' + c));
        return;
      }
      const isTaxId = /^\d+$/.test(arg);
      const body = { start_codon: flags.start || 'ATG' };
      if (isTaxId) {
        body.organism_tax_id = parseInt(arg);
      } else {
        body.clade = arg.toLowerCase();
      }
      const data = await api('POST', '/api/regulatory/kozak', body);

      const name = flags.name || `kozak-${arg}`;
      const kozakObj = {
        type: 'kozak',
        sequence: data.sequence,
        length: data.sequence.length,
        source: 'generated',
        label: `${data.organism} Kozak`,
        consensus: data.consensus,
        notes: data.notes || null,
      };
      wsStore(name, kozakObj);
      if (flags.json) { printJson({ workspace_name: name, ...kozakObj }); return; }
      // Kozak sequences are short enough to show inline
      print(`Saved as '${name}' (${data.sequence.length} bp, ${data.organism}: ${data.sequence})`, 'success');
      if (data.notes) {
        const isWarning = data.notes.toLowerCase().includes('default') || data.notes.toLowerCase().includes('not in database');
        print(`Notes: ${data.notes}`, isWarning ? 'warn' : 'dim');
      }
    }

        const params = [];
        if (q) params.push(`q=${encodeURIComponent(q)}`);
        if (flags.type) params.push(`sequence_type=${encodeURIComponent(flags.type)}`);
        const path = `/api/misc/search${params.length ? '?' + params.join('&') : ''}`;
        const data = await api('GET', path);
        if (flags.json) { printJson(data); return; }
        print(`Found ${data.total} sequence(s)`, 'info');
        if (data.message) print(data.message, 'warn');
        const truncate = (s, n) => (s && s.length > n) ? s.slice(0, n - 1) + '…' : (s || '');
        const rows = (data.items || []).map(i => ({
          name: i.name,
          seq_type: i.sequence_type,
          category: truncate(i.category, 24),
          length: i.sequence_type === 'protein' ? `${i.length} aa` : `${i.length} bp`,
          notes: truncate(i.notes, 50),
        }));
        printTable(rows, ['name', 'seq_type', 'category', 'length', 'notes'], null, 'name');
      } else if (verb === 'get') {
        const ids = args.slice(1);
        if (ids.length === 0) {
          print('Usage: misc get <id_or_name> [<id_or_name> ...] [--name=X]', 'warn');
          return;
        }
        if (flags.name && ids.length > 1) {
          print('--name can only be used with a single misc sequence.', 'warn');
          return;
        }
        const results = [];
        for (const mid of ids) {
          try {
            const data = await api('GET', `/api/misc/${encodeURIComponent(mid)}`);
            const wsType = data.sequence_type === 'protein' ? 'protein' : 'dna';
            const name = (ids.length === 1 && flags.name) ? flags.name : (data.name || mid);
            const wsObj = {
              type: wsType,
              sequence: data.sequence || '',
              length: data.length,
              source: 'misc-db',
              label: data.notes || data.category || data.name,
              category: data.category || null,
              subtype: data.subtype || null,
            };
            wsStore(name, wsObj);
            results.push({ mid, name, wsObj, data, ok: true });
            if (!flags.json) {
              const unit = wsType === 'protein' ? 'aa' : 'bp';
              const labelPart = data.notes ? `, ${data.notes}` : (data.category ? `, ${data.category}` : '');
              print(`Saved as '${name}' (${data.length} ${unit}${labelPart})`, 'success');
            }
          } catch (e) {
            results.push({ mid, ok: false, error: e.message });
            if (!flags.json) print(`Failed '${mid}': ${e.message}`, 'error');
          }
        }
        if (flags.json) {
          printJson(results.map(r => r.ok
            ? { workspace_name: r.name, ...r.wsObj }
            : { id: r.mid, error: r.error }));
        }
      } else {
        print('Usage: misc search|get ...', 'warn');
      }
    }

    async function handleProject(args, flags) {
      const verb = args[0];
      if (verb === 'list') {
        const data = await api('GET', '/api/projects/');
        if (flags.json) { printJson(data); return; }
        const rows = data.map(p => ({
          ...p,
          active: state.activeProject && state.activeProject.id === p.id ? '→' : '',
        }));
        printTable(rows, ['active', 'id', 'name', 'description', 'created_at'], { id: 'project use <id>' });
      } else if (verb === 'create') {
        const name = args.slice(1).join(' ');
        if (!name) { print('Usage: project create <name> [--desc=X]', 'warn'); return; }
        const body = { name, description: flags.desc || null };
        const data = await api('POST', '/api/projects/', body);
        state.activeProject = { id: data.id, name: data.name };
        state.activeConstruct = null;
        refreshUI();
        if (flags.json) { printJson(data); return; }
        print(`Created project: ${data.id}`, 'success');
        print(`Name: ${data.name}`, 'info');
        if (data.description) print(`Description: ${data.description}`, 'dim');
        print(`Active project set to '${data.name}'`, 'dim');
      } else if (verb === 'use') {
        if (!args[1]) { print('Usage: project use <id>', 'warn'); return; }
        const data = await useProject(args[1]);
        if (flags.json) { printJson({ active_project: state.activeProject }); return; }
        print(`Active project: ${data.name} (${data.id})`, 'success');
      } else if (verb === 'get') {
        const id = args[1] || (state.activeProject && state.activeProject.id);
        if (!id) { print('Usage: project get [id] — or set active with "project use <id>"', 'warn'); return; }
        const data = await api('GET', `/api/projects/${id}`);
        if (flags.json) { printJson(data); return; }
        print(`Project: ${data.name}`, 'info');
        print(`ID: ${data.id}`, 'dim');
        if (data.description) print(`Description: ${data.description}`);
        print(`Created: ${data.created_at}`, 'dim');
        if (data.constructs && data.constructs.length) {
          print('');
          print('Constructs:', 'info');
          printTable(data.constructs, ['id', 'name', 'organism_tax_id', 'updated_at'], { id: 'construct use <id>' });
        }
      } else if (verb === 'update') {
        const id = args[1] || (state.activeProject && state.activeProject.id);
        if (!id) { print('Usage: project update [id] [--name=X] [--desc=X]', 'warn'); return; }
        const body = {};
        if (flags.name) body.name = flags.name;
        if (flags.desc) body.description = flags.desc;
        const data = await api('PUT', `/api/projects/${id}`, body);
        if (state.activeProject && state.activeProject.id === id) {
          if (flags.name) state.activeProject.name = flags.name;
          if (flags.desc) state.activeProject.description = flags.desc;
          refreshUI();
        }
        print('Updated.', 'success');
      } else if (verb === 'rename') {
        const hasId = args[2] !== undefined;
        const id = hasId ? args[1] : (state.activeProject && state.activeProject.id);
        const newName = hasId ? args[2] : args[1];
        if (!id || !newName) { print('Usage: project rename [id] <new_name>', 'warn'); return; }
        await api('PUT', `/api/projects/${id}`, { name: newName });
        if (state.activeProject && state.activeProject.id === id) {
          state.activeProject.name = newName;
          refreshUI();
        }
        print(`Renamed to '${newName}'.`, 'success');
      } else if (verb === 'delete') {
        const id = args[1] || (state.activeProject && state.activeProject.id);
        if (!id) { print('Usage: project delete [id]', 'warn'); return; }
        const name = (state.activeProject && state.activeProject.id === id) ? state.activeProject.name : id;
        print(`Delete project '${name}'? This cannot be undone. (y/n)`, 'warn');
        state.pendingConfirm = {
          action: async () => {
            await api('DELETE', `/api/projects/${id}`);
            if (state.activeProject && state.activeProject.id === id) state.activeProject = null;
            refreshUI();
            print('Deleted.', 'success');
          }
        };
      } else {
        print('Usage: project list|create|use|get|update|rename|delete ...', 'warn');
      }
    }

    function printConstructElements(data) {
      if (data.elements && data.elements.length) {
        print('');
        print('Current elements:', 'info');
        const rows = data.elements
          .sort((a, b) => a.position - b.position)
          .map(el => ({
            position: el.position,
            label: el.label,
            type: el.element_type,
            length: el.sequence ? `${el.sequence.length} bp` : '—',
          }));
        printTable(rows, ['position', 'label', 'type', 'length']);
      }
    }

    async function handleConstruct(args, flags) {
      const verb = args[0];
      if (verb === 'list') {
        const projectId = flags.project || (state.activeProject && state.activeProject.id);
        if (!projectId) {
          print('Usage: construct list [--project=<id>] — or set active with "project use <id>"', 'warn');
          return;
        }
        const data = await api('GET', `/api/constructs/?project_id=${encodeURIComponent(projectId)}`);
        if (flags.json) { printJson(data); return; }
        if (!data.length) {
          print('No constructs in this project.', 'dim');
          return;
        }
        const rows = data.map(c => ({
          active: state.activeConstruct && state.activeConstruct.id === c.id ? '→' : '',
          id: c.id,
          name: c.name,
          organism: c.organism_tax_id || '—',
          elements: c.elements ? c.elements.length : 0,
          created_at: c.created_at,
        }));
        printTable(rows, ['active', 'id', 'name', 'organism', 'elements', 'created_at'], { id: 'construct use <id>' });
      } else if (verb === 'create') {
        const name = args.slice(1).join(' ');
        const projectId = flags.project || (state.activeProject && state.activeProject.id);
        if (!name || !projectId) {
          print('Usage: construct create <name> [--project=<id>] [--organism=<tax_id>]', 'warn');
          if (!projectId) print('No active project. Use "project use <id>" or pass --project=<id>.', 'dim');
          return;
        }
        const body = {
          project_id: projectId,
          name: name,
          organism_tax_id: flags.organism ? parseInt(flags.organism) : null,
          elements: [],
        };
        const data = await api('POST', '/api/constructs/', body);
        state.activeConstruct = { id: data.id, name: data.name };
        refreshUI();
        if (flags.json) { printJson(data); return; }
        print(`Created construct: ${data.id}`, 'success');
        print(`Name: ${data.name}`, 'info');
        print(`Active construct set to '${data.name}'`, 'dim');
        print(`Next: construct add <workspace_name> [<workspace_name> ...] (types inferred from workspace objects)`, 'dim');
      } else if (verb === 'use') {
        if (!args[1]) { print('Usage: construct use <id>', 'warn'); return; }
        const data = await useConstruct(args[1]);
        if (flags.json) { printJson({ active_construct: state.activeConstruct }); return; }
        print(`Active construct: ${data.name} (${data.id})`, 'success');
      } else if (verb === 'add') {
        // Supports: construct add <ws1> [ws2 ws3 ...]            (active construct)
        //           construct add <construct_id> <ws1> [ws2 ...] (explicit construct)
        // Disambiguation: treat args[1] as an explicit construct_id only when it
        // looks like a UUID. Otherwise everything from args[1] onward is ws names.
        const UUID_RE = /^[0-9a-f]{8}-?[0-9a-f]{4}-?[0-9a-f]{4}-?[0-9a-f]{4}-?[0-9a-f]{12}$/i;
        let constructId, wsNames;
        if (args[1] && UUID_RE.test(args[1])) {
          constructId = args[1];
          wsNames = args.slice(2);
        } else if (args[1]) {
          constructId = state.activeConstruct && state.activeConstruct.id;
          wsNames = args.slice(1);
        }
        if (!constructId || !wsNames || wsNames.length === 0) {
          print('Usage: construct add [construct_id] <workspace_name> [<workspace_name> ...] [--as=type] [--position=N]', 'warn');
          if (!constructId) print('No active construct. Use "construct use <id>" or pass the construct ID.', 'dim');
          return;
        }

        // Resolve each workspace object up front so we fail fast on missing names
        const wsObjs = [];
        for (const name of wsNames) {
          const obj = wsGet(name);
          if (!obj) {
            print(`'${name}' not found in workspace. Use 'ws' to list available objects.`, 'error');
            return;
          }
          wsObjs.push({ name, obj });
        }

        // Infer element type from each workspace object type, or use --as override
        const typeMap = {
          'promoter': 'promoter',
          'terminator': 'terminator',
          'kozak': 'kozak',
          'cds': 'cds',
          'dna': 'cds',
          'protein': 'cds',
        };
        const resolveType = (obj) => flags.as || typeMap[obj.type] || 'custom';

        // Fetch current construct and determine starting insertion position
        const current = await api('GET', `/api/constructs/${constructId}`);
        const existingElements = current.elements || [];
        const startPos = flags.position != null ? parseInt(flags.position) : existingElements.length;
        const count = wsObjs.length;

        // Block mixing protein and DNA sequences within a single construct.
        const detectSeqType = (seq) => {
          const clean = (seq || '').toUpperCase().replace(/\s+/g, '');
          if (!clean) return 'unknown';
          return /^[ATCGN]+$/.test(clean) ? 'dna' : 'protein';
        };
        const newTypes = wsObjs.map(({ obj }) => (obj.type === 'protein' ? 'protein' : detectSeqType(obj.sequence)));
        const existingTypes = existingElements.map(el => detectSeqType(el.sequence));
        const allTypes = new Set([...newTypes, ...existingTypes].filter(t => t === 'dna' || t === 'protein'));
        if (allTypes.has('dna') && allTypes.has('protein')) {
          const newProtein = wsObjs.filter((_, i) => newTypes[i] === 'protein').map(o => o.name);
          const newDna = wsObjs.filter((_, i) => newTypes[i] === 'dna').map(o => o.name);
          const existingHasProtein = existingTypes.includes('protein');
          const existingHasDna = existingTypes.includes('dna');
          print('Cannot add: construct would contain both protein and DNA sequences.', 'warn');
          if (existingHasProtein || existingHasDna) {
            print(`  Existing construct contains: ${existingHasProtein ? 'protein' : ''}${existingHasProtein && existingHasDna ? ' + ' : ''}${existingHasDna ? 'DNA' : ''}`, 'dim');
          }
          if (newProtein.length) print(`  New protein: ${newProtein.join(', ')}`, 'dim');
          if (newDna.length) print(`  New DNA: ${newDna.join(', ')}`, 'dim');
          return;
        }

        // Shift existing elements at/after the insertion point by `count`
        const updatedElements = existingElements.map(el => ({
          element_type: el.element_type,
          label: el.label,
          sequence: el.sequence,
          position: el.position >= startPos ? el.position + count : el.position,
        }));

        // Append new elements in order starting at startPos
        const newElements = wsObjs.map(({ name, obj }, i) => ({
          element_type: resolveType(obj),
          label: name,
          sequence: obj.sequence,
          position: startPos + i,
        }));
        updatedElements.push(...newElements);
        updatedElements.sort((a, b) => a.position - b.position);

        await api('PUT', `/api/constructs/${constructId}`, { elements: updatedElements });
        if (flags.json) {
          const freshJson = await api('GET', `/api/constructs/${constructId}`);
          printJson(freshJson);
          return;
        }
        newElements.forEach((ne, i) => {
          const { name, obj } = wsObjs[i];
          print(`Added '${name}' as ${ne.element_type} at position ${ne.position} (${obj.length} ${wsUnit(obj.type)})`, 'success');
        });
        const fresh = await api('GET', `/api/constructs/${constructId}`);
        printConstructElements(fresh);

      } else if (verb === 'get') {
        const id = args[1] || (state.activeConstruct && state.activeConstruct.id);
        if (!id) { print('Usage: construct get [id] — or set active with "construct use <id>"', 'warn'); return; }
        const data = await api('GET', `/api/constructs/${id}`);
        if (flags.json) { printJson(data); return; }
        print(`Construct: ${data.name}`, 'info');
        print(`ID: ${data.id}`, 'dim');
        if (data.organism_tax_id) print(`Organism: ${data.organism_tax_id}`);
        if (data.elements && data.elements.length) {
          printConstructElements(data);
        } else {
          print('No elements yet. Use "construct add <workspace_name>" to add elements.', 'dim');
        }
      } else if (verb === 'rename') {
        const hasId = args[2] !== undefined;
        const id = hasId ? args[1] : (state.activeConstruct && state.activeConstruct.id);
        const newName = hasId ? args[2] : args[1];
        if (!id || !newName) { print('Usage: construct rename [id] <new_name>', 'warn'); return; }
        await api('PUT', `/api/constructs/${id}`, { name: newName });
        if (state.activeConstruct && state.activeConstruct.id === id) {
          state.activeConstruct.name = newName;
          refreshUI();
        }
        print(`Renamed to '${newName}'.`, 'success');
      } else if (verb === 'element') {
        const sub = args[1];
        if (sub === 'rename') {
          const position = parseInt(args[2], 10);
          const newLabel = args.slice(3).join(' ');
          if (!position || !newLabel) {
            print('Usage: construct element rename <position> <new_label>', 'warn');
            return;
          }
          const constructId = state.activeConstruct && state.activeConstruct.id;
          if (!constructId) { print('No active construct. Use "construct use <id>" first.', 'warn'); return; }
          await api('PATCH', `/api/constructs/${constructId}/elements/${position}`, { label: newLabel });
          print(`Renamed element at position ${position} to '${newLabel}'.`, 'success');
        } else {
          print('Usage: construct element rename <position> <new_label>', 'warn');
        }
      } else if (verb === 'delete') {
        const id = args[1] || (state.activeConstruct && state.activeConstruct.id);
        if (!id) { print('Usage: construct delete [id]', 'warn'); return; }
        const name = (state.activeConstruct && state.activeConstruct.id === id) ? state.activeConstruct.name : id;
        print(`Delete construct '${name}'? This cannot be undone. (y/n)`, 'warn');
        state.pendingConfirm = {
          action: async () => {
            await api('DELETE', `/api/constructs/${id}`);
            if (state.activeConstruct && state.activeConstruct.id === id) state.activeConstruct = null;
            refreshUI();
            print('Deleted.', 'success');
          }
        };
      } else if (verb === 'assemble') {
        const id = args[1] || (state.activeConstruct && state.activeConstruct.id);
        if (!id) { print('Usage: construct assemble [id] [--seq]', 'warn'); return; }
        const data = await api('POST', `/api/constructs/${id}/assemble`);
        if (flags.json) { printJson(data); return; }
        if (data.full_sequence) {
          print(`Total length: ${data.full_sequence.length} bp`, 'info');
        }
        if (data.annotations && data.annotations.length) {
          print('');
          print('Annotations:', 'info');
          printTable(data.annotations, ['label', 'type', 'start', 'end', 'length']);
          print('');
          print('Diagram:', 'info');
          printConstructDiagram(data.annotations);
        }
        if (data.warnings && data.warnings.length) {
          print('');
          data.warnings.forEach(w => print('Warning: ' + w, 'warn'));
        }
        if (flags.seq && data.full_sequence) {
          print('');
          printCodons(data.full_sequence, 'Assembled sequence', data.annotations);
        }
      } else if (verb === 'export') {
        const id = args[1] || (state.activeConstruct && state.activeConstruct.id);
        if (!id) { print('Usage: construct export [id] [--format=genbank]', 'warn'); return; }
        const format = flags.format || 'genbank';
        const url = `${state.baseUrl}/api/constructs/${encodeURIComponent(id)}/export?format=${encodeURIComponent(format)}`;
        let resp;
        try {
          resp = await fetch(url, { headers: { 'X-Session-ID': state.sessionId } });
        } catch (e) {
          print(`Connection failed. Is the backend running at ${state.baseUrl}?`, 'error');
          return;
        }
        if (!resp.ok) {
          const data = await resp.json().catch(() => null);
          const raw = data?.detail || `HTTP ${resp.status}`;
          print(typeof raw === 'string' ? raw : JSON.stringify(raw), 'error');
          return;
        }
        const blob = await resp.blob();
        const cd = resp.headers.get('Content-Disposition') || '';
        const match = cd.match(/filename="([^"]+)"/);
        const filename = match ? match[1] : `${id}.gb`;
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(a.href);
        print(`Exported ${filename} (${blob.size} bytes). Import into Benchling via "Create → Import DNA/RNA Sequences".`, 'success');
      } else if (verb === 'digest') {
        // construct digest [id] <enzyme1> [enzyme2 ...]
        const UUID_RE = /^[0-9a-f]{8}-?[0-9a-f]{4}-?[0-9a-f]{4}-?[0-9a-f]{4}-?[0-9a-f]{12}$/i;
        let id, enzymes;
        if (args[1] && UUID_RE.test(args[1])) {
          id = args[1];
          enzymes = args.slice(2);
        } else {
          id = state.activeConstruct && state.activeConstruct.id;
          enzymes = args.slice(1);
        }
        if (!id || enzymes.length === 0) {
          print('Usage: construct digest [id] <enzyme1> [enzyme2 ...]', 'warn');
          if (!id) print('No active construct. Use "construct use <id>" or pass the construct ID.', 'dim');
          return;
        }
        const data = await api('POST', `/api/constructs/${id}/digest`, { enzymes });
        if (flags.json) { printJson(data); return; }
        print(`Sequence length: ${data.sequence_length} bp`, 'info');
        print('');
        printDigestDiagram(data.enzymes, data.annotations, data.sequence_length);
        if (data.warnings && data.warnings.length) {
          print('');
          data.warnings.forEach(w => print('Warning: ' + w, 'warn'));
        }
        if (flags.seq && data.full_sequence) {
          const allCuts = Array.from(new Set(
            data.enzymes.flatMap(e => e.cut_positions || [])
          )).sort((a, b) => a - b);
          print('');
          printCodons(data.full_sequence, 'Assembled sequence', data.annotations, allCuts);
        }
      } else {
        print('Usage: construct list|create|use|add|get|rename|element|delete|assemble|export|digest ...', 'warn');
      }
    }

    // ── Workspace commands ──────────────────────────────────────────
    function handleWorkspace(args, flags) {
      // ws add <name> <sequence> [--type=X]
      if (args[0] === 'add') {
        const name = args[1];
        const seq = args.slice(2).join('');
        if (!name || !seq) {
          print('Usage: ws add <name> <sequence> [--type=promoter|cds|terminator|protein|custom]', 'warn');
          return;
        }
        const rawType = (flags.type || 'custom').toLowerCase();
        const proteinAliases = ['protein', 'aa', 'amino-acid', 'amino_acid', 'aminoacid'];
        const isProtein = proteinAliases.includes(rawType);
        const upper = seq.toUpperCase();
        if (isProtein) {
          if (!/^[ACDEFGHIKLMNPQRSTVWYBXZUO*]+$/.test(upper)) {
            print('Protein sequence must contain only IUPAC amino acid letters.', 'error');
            return;
          }
          wsStore(name, {
            type: 'protein',
            sequence: upper,
            length: upper.length,
            source: 'manual',
            label: name,
          });
          print(`Saved '${name}' as protein (${upper.length} aa)`, 'success');
          return;
        }
        if (!/^[ATCGatcg]+$/.test(seq)) {
          print('Sequence must contain only A, T, C, G characters.', 'error');
          return;
        }
        const seqType = rawType;
        wsStore(name, {
          type: seqType === 'cds' || seqType === 'promoter' || seqType === 'terminator' ? seqType : 'dna',
          sequence: upper,
          length: upper.length,
          source: 'manual',
          label: name,
        });
        print(`Saved '${name}' as ${seqType} (${seq.length} bp)`, 'success');
        return;
      }

      const entries = Object.entries(state.workspace);
      if (flags && flags.json) {
        printJson(Object.fromEntries(entries.map(([name, obj]) => [name, { type: obj.type, length: obj.length, label: obj.label || '' }])));
        return;
      }
      if (entries.length === 0) {
        print('Workspace is empty.', 'dim');
        print('Fetch sequences with gene/protein/optimize/kozak/promoter commands,', 'dim');
        print('or use "ws add <name> <sequence>" to add a raw sequence.', 'dim');
        return;
      }
      const rows = entries.map(([name, obj]) => ({
        name,
        type: obj.type,
        length: `${obj.length} ${wsUnit(obj.type)}`,
        label: obj.label || '',
      }));
      printWsTable(rows);
    }

    function appendWsToCmd(name) {
      const current = cmdEl.value;
      const needsSpace = current.length > 0 && !current.endsWith(' ');
      cmdEl.value = current + (needsSpace ? ' ' : '') + name + ' ';
      cmdEl.focus();
      cmdEl.setSelectionRange(cmdEl.value.length, cmdEl.value.length);
    }

    function printWsTable(rows) {
      const columns = ['name', 'type', 'length', 'label'];
      const widths = {};
      columns.forEach(c => widths[c] = c.length);
      rows.forEach(r => columns.forEach(c => {
        const val = String(r[c] ?? '');
        if (val.length > widths[c]) widths[c] = Math.min(val.length, 60);
      }));
      const insLabel = '';
      const insWidth = 3;
      const header = insLabel.padEnd(insWidth) + '  ' + columns.map(c => c.padEnd(widths[c])).join('  ');
      const sep = '─'.repeat(insWidth) + '──' + columns.map(c => '─'.repeat(widths[c])).join('──');
      print(header, 'bold');
      print(sep, 'dim');
      rows.forEach(r => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'line';
        const cell = document.createElement('span');
        cell.className = 'ws-insert-cell';
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'ws-insert-btn';
        btn.textContent = '+';
        btn.setAttribute('aria-label', `Insert ${r.name}`);
        btn.title = `Insert ${r.name}`;
        btn.addEventListener('click', () => appendWsToCmd(r.name));
        cell.appendChild(btn);
        rowDiv.appendChild(cell);
        rowDiv.appendChild(document.createTextNode('  '));
        columns.forEach((c, i) => {
          if (i > 0) rowDiv.appendChild(document.createTextNode('  '));
          rowDiv.appendChild(document.createTextNode(String(r[c] ?? '').padEnd(widths[c])));
        });
        termEl.appendChild(rowDiv);
      });
      termEl.scrollTop = termEl.scrollHeight;
      print('Tip: click + to append the name to the command line.', 'dim');
    }

    function handleShow(args, flags) {
      const name = args[0];
      if (!name) { print('Usage: show <name> [--info]', 'warn'); return; }
      const obj = wsGet(name);
      if (!obj) {
        print(`'${name}' not found in workspace. Use 'ws' to list available objects.`, 'error');
        return;
      }
      if (flags.json) {
        printJson({ workspace_name: name, ...obj });
        return;
      }
      if (flags.info) {
        print(`Name:     ${name}`, 'info');
        print(`Type:     ${obj.type}`);
        print(`Length:   ${obj.length} ${wsUnit(obj.type)}`);
        print(`Source:   ${obj.source}`);
        if (obj.label) print(`Label:    ${obj.label}`);
        if (obj.accession) print(`Accession: ${obj.accession}`);
        if (obj.cai_before != null) print(`CAI:      ${obj.cai_before} → ${obj.cai_after}`);
        if (obj.gc_content != null) print(`GC:       ${(obj.gc_content * 100).toFixed(1)}%`);
        if (obj.consensus) print(`Consensus: ${obj.consensus}`);
        if (obj.strength) print(`Strength: ${obj.strength}`);
        if (obj.notes) print(`Notes:    ${obj.notes}`);
        print('');
        if (obj.source === 'optimized') { printCodons(obj.sequence); } else { printSeq(obj.sequence); }
      } else {
        print(`${name} (${obj.length} ${wsUnit(obj.type)}, ${obj.type}):`, 'info');
        if (obj.source === 'optimized') { printCodons(obj.sequence); } else { printSeq(obj.sequence); }
      }
    }

    function reverseComplementDNA(seq) {
      const map = { A: 'T', T: 'A', C: 'G', G: 'C', N: 'N', a: 't', t: 'a', c: 'g', g: 'c', n: 'n' };
      let out = '';
      for (let i = seq.length - 1; i >= 0; i--) {
        out += map[seq[i]] || seq[i];
      }
      return out;
    }

    function countOccurrences(haystack, needle) {
      if (!needle) return 0;
      let count = 0;
      let idx = haystack.indexOf(needle);
      while (idx !== -1) {
        count++;
        idx = haystack.indexOf(needle, idx + 1);
      }
      return count;
    }

    function findSlice(source, startMarker, endMarker) {
      const upperSrc = source.toUpperCase();
      const upStart = startMarker.toUpperCase();
      const upEnd = endMarker.toUpperCase();
      const startIdx = upperSrc.indexOf(upStart);
      if (startIdx === -1) return { ok: false, reason: 'start' };
      const endIdx = upperSrc.indexOf(upEnd, startIdx);
      if (endIdx === -1) return { ok: false, reason: 'end' };
      return {
        ok: true,
        startIdx,
        endIdx,
        sequence: source.substring(startIdx, endIdx + upEnd.length),
        startHits: countOccurrences(upperSrc, upStart),
        endHits: countOccurrences(upperSrc, upEnd),
      };
    }

    function handleSlice(args, flags) {
      const name = args[0];
      if (!name) {
        print('Usage: slice <name> <START>...<END> [--name=X] [--rc]', 'warn');
        print('       slice <name> --from=ATC --to=GCC [--name=X] [--rc]', 'warn');
        return;
      }
      const obj = wsGet(name);
      if (!obj) {
        print(`'${name}' not found in workspace. Use 'ws' to list available objects.`, 'error');
        return;
      }

      let startMarker, endMarker;
      if (flags.from && flags.to) {
        startMarker = String(flags.from);
        endMarker = String(flags.to);
      } else if (args[1] && args[1].includes('...')) {
        const parts = args[1].split('...');
        if (parts.length !== 2 || !parts[0] || !parts[1]) {
          print('Invalid marker format. Use START...END (e.g. ATC...GCC).', 'error');
          return;
        }
        startMarker = parts[0];
        endMarker = parts[1];
      } else {
        print('Missing markers. Use START...END or --from=ATC --to=GCC.', 'warn');
        return;
      }

      const isProtein = obj.type === 'protein';
      if (flags.rc && isProtein) {
        print('--rc is only valid for DNA sequences.', 'error');
        return;
      }

      let result = findSlice(obj.sequence, startMarker, endMarker);
      let strand = '+';
      if (!result.ok && flags.rc && !isProtein) {
        const rc = reverseComplementDNA(obj.sequence);
        const rcResult = findSlice(rc, startMarker, endMarker);
        if (rcResult.ok) {
          result = rcResult;
          strand = '-';
        }
      }

      if (!result.ok) {
        if (result.reason === 'start') {
          print(`Start marker '${startMarker}' not found in '${name}'${flags.rc ? ' (forward or reverse strand)' : ''}.`, 'error');
        } else {
          print(`End marker '${endMarker}' not found after start in '${name}'${flags.rc ? ' (forward or reverse strand)' : ''}.`, 'error');
        }
        return;
      }

      const oneBasedStart = result.startIdx + 1;
      const oneBasedEnd = result.endIdx + endMarker.length;
      const unit = wsUnit(obj.type);

      if (flags.json) {
        printJson({
          source: name,
          start: oneBasedStart,
          end: oneBasedEnd,
          length: result.sequence.length,
          strand,
          sequence: result.sequence,
          saved_as: flags.name || null,
        });
      } else {
        if (result.startHits > 1 || result.endHits > 1) {
          print(`Ambiguous markers: start matched ${result.startHits}×, end matched ${result.endHits}×. Using first pair.`, 'warn');
        }
        const strandLabel = strand === '-' ? ' (reverse strand)' : '';
        print(`${name} [${oneBasedStart}..${oneBasedEnd}]${strandLabel} — ${result.sequence.length} ${unit}:`, 'info');
        if (obj.source === 'optimized') { printCodons(result.sequence); } else { printSeq(result.sequence); }
      }

      if (flags.name) {
        if (wsGet(flags.name)) {
          print(`'${flags.name}' already exists in workspace. Remove it first or choose a different name.`, 'error');
          return;
        }
        const sliced = {
          type: obj.type,
          sequence: result.sequence,
          length: result.sequence.length,
          source: 'slice',
          label: `Slice of ${name} [${oneBasedStart}..${oneBasedEnd}]${strand === '-' ? ' rc' : ''}`,
        };
        wsStore(flags.name, sliced);
        if (!flags.json) print(`Saved as '${flags.name}' (${result.sequence.length} ${unit}).`, 'success');
      }
    }

    function handleRm(args) {
      const name = args[0];
      if (!name) { print('Usage: rm <name>', 'warn'); return; }
      if (!wsGet(name)) {
        print(`'${name}' not found in workspace.`, 'error');
        return;
      }
      delete state.workspace[name];
      print(`Removed '${name}' from workspace.`, 'success');
      refreshUI();
    }

    async function handleRename(args) {
      const [oldName, newName] = args;
      if (!oldName || !newName) {
        print('Usage: rename <old> <new>  |  rename construct <new>  |  rename project <new>', 'warn');
        return;
      }
      if (wsGet(oldName)) {
        if (wsGet(newName)) {
          print(`'${newName}' already exists in workspace. Remove it first or choose a different name.`, 'error');
          return;
        }
        state.workspace[newName] = state.workspace[oldName];
        delete state.workspace[oldName];
        print(`Renamed '${oldName}' → '${newName}'`, 'success');
        refreshUI();
        return;
      }
      if (oldName === 'construct') {
        if (!state.activeConstruct) { print('No active construct. Use "construct use <id>" first.', 'warn'); return; }
        const id = state.activeConstruct.id;
        await api('PUT', `/api/constructs/${id}`, { name: newName });
        state.activeConstruct.name = newName;
        refreshUI();
        print(`Renamed construct → '${newName}'`, 'success');
        return;
      }
      if (oldName === 'project') {
        if (!state.activeProject) { print('No active project. Use "project use <id>" first.', 'warn'); return; }
        const id = state.activeProject.id;
        await api('PUT', `/api/projects/${id}`, { name: newName });
        state.activeProject.name = newName;
        refreshUI();
        print(`Renamed project → '${newName}'`, 'success');
        return;
      }
      print(`'${oldName}' not found in workspace.`, 'error');
    }

    // ── Navigation helpers ──────────────────────────────────────────
    async function useProject(id) {
      const data = await api('GET', `/api/projects/${id}`);
      state.activeProject = { id: data.id, name: data.name };
      state.activeConstruct = null;
      refreshUI();
      return data;
    }

    async function useConstruct(id) {
      const data = await api('GET', `/api/constructs/${id}`);
      state.activeConstruct = { id: data.id, name: data.name };
      refreshUI();
      return data;
    }

    async function handleCd(args, flags) {
      const target = args[0];

      if (!target || target === '/') {
        state.activeProject = null;
        state.activeConstruct = null;
        refreshUI();
        if (flags.json) { printJson({ active_project: null, active_construct: null }); return; }
        print('Returned to root.', 'dim');
        return;
      }

      if (target === '..') {
        if (state.activeConstruct) {
          state.activeConstruct = null;
          refreshUI();
          if (flags.json) { printJson({ active_project: state.activeProject, active_construct: null }); return; }
          print(`Left construct. Active project: ${state.activeProject.name}`, 'dim');
        } else if (state.activeProject) {
          state.activeProject = null;
          refreshUI();
          if (flags.json) { printJson({ active_project: null, active_construct: null }); return; }
          print('Left project. At root.', 'dim');
        } else {
          print('Already at root.', 'warn');
        }
        return;
      }

      const name = args.join(' ');
      const needle = name.toLowerCase();

      if (state.activeConstruct) {
        print("Already in a construct. Use 'cd ..' first.", 'warn');
        return;
      }

      if (state.activeProject) {
        const list = await api('GET', `/api/constructs/?project_id=${encodeURIComponent(state.activeProject.id)}`);
        const matches = list.filter(c => c.name.toLowerCase() === needle);
        if (matches.length === 0) {
          print(`No construct named '${name}' in project '${state.activeProject.name}'.`, 'error');
        } else if (matches.length > 1) {
          print(`Ambiguous: ${matches.length} constructs named '${name}'. Use 'construct use <id>' to disambiguate.`, 'warn');
          const rows = matches.map(c => ({
            id: c.id,
            name: c.name,
            organism: c.organism_tax_id || '—',
            created_at: c.created_at,
          }));
          printTable(rows, ['id', 'name', 'organism', 'created_at'], { id: 'construct use <id>' });
        } else {
          const data = await useConstruct(matches[0].id);
          if (flags.json) { printJson({ active_construct: state.activeConstruct }); return; }
          print(`Active construct: ${data.name} (${data.id})`, 'success');
        }
        return;
      }

      const list = await api('GET', '/api/projects/');
      const matches = list.filter(p => p.name.toLowerCase() === needle);
      if (matches.length === 0) {
        print(`No project named '${name}'.`, 'error');
      } else if (matches.length > 1) {
        print(`Ambiguous: ${matches.length} projects named '${name}'. Use 'project use <id>' to disambiguate.`, 'warn');
        const rows = matches.map(p => ({
          id: p.id,
          name: p.name,
          description: p.description || '',
          created_at: p.created_at,
        }));
        printTable(rows, ['id', 'name', 'description', 'created_at'], { id: 'project use <id>' });
      } else {
        const data = await useProject(matches[0].id);
        if (flags.json) { printJson({ active_project: state.activeProject }); return; }
        print(`Active project: ${data.name} (${data.id})`, 'success');
      }
    }

    // ── Command dispatch ────────────────────────────────────────────
    const commands = {
      help: (a, f) => handleHelp(a, f),
      health: (a, f) => handleHealth(a, f),
      gene: handleGene,
      protein: handleProtein,
      organism: handleOrganism,
      optimize: handleOptimize,
      kozak: handleKozak,
      promoter: handlePromoter,
      terminator: handleTerminator,
      misc: handleMisc,
      project: handleProject,
      construct: handleConstruct,
      cd: handleCd,
      ws: (a, f) => handleWorkspace(a, f),
      workspace: (a, f) => handleWorkspace(a, f),
      show: handleShow,
      slice: handleSlice,
      rm: handleRm,
      rename: handleRename,
      status: (a, f) => {
        const p = state.activeProject;
        const c = state.activeConstruct;
        if (f && f.json) { printJson({ active_project: p, active_construct: c }); return; }
        print(`Project:   ${p ? p.name + ' (' + p.id + ')' : 'none'}`, p ? 'info' : 'dim');
        print(`Construct: ${c ? c.name + ' (' + c.id + ')' : 'none'}`, c ? 'info' : 'dim');
      },
      clear: () => { termEl.innerHTML = ''; },
      history: () => { state.history.forEach((h, i) => print(`  ${i + 1}  ${h}`)); },
      set: (args) => {
        if (args[0] === 'base-url' && args[1]) {
          state.baseUrl = args[1];
          print(`Backend URL set to ${state.baseUrl}`, 'success');
        } else {
          print('Usage: set base-url <url>', 'warn');
        }
      },
    };

    async function runCommand(input) {
      const trimmed = input.trim();
      if (!trimmed) return;

      // Handle pending confirmation (y/n for destructive actions)
      if (state.pendingConfirm) {
        const pending = state.pendingConfirm;
        state.pendingConfirm = null;
        print(`> ${trimmed}`, 'dim');
        if (trimmed.toLowerCase() === 'y' || trimmed.toLowerCase() === 'yes') {
          try { await pending.action(); } catch (e) { print(`ERROR: ${e.message}`, 'error'); }
        } else {
          print('Cancelled.', 'dim');
        }
        print('');
        return;
      }

      state.history.push(trimmed);
      state.historyIndex = state.history.length;

      print(`${document.querySelector('#input-area .prompt').textContent} ${trimmed}`, 'dim');

      const { args, flags } = parseCommand(trimmed);
      if (args.length === 0) return;

      const cmd = args[0].toLowerCase();
      const handler = commands[cmd];

      if (!handler) {
        print(`Unknown command: ${cmd}. Type 'help' for available commands.`, 'error');
        return;
      }

      try {
        await handler(args.slice(1), flags);
      } catch (e) {
        if (flags.json) {
          printJson({ error: e.message, command: trimmed });
        } else {
          print(`ERROR: ${e.message}`, 'error');
        }
      }
      print('');
    }

    // ── Input handling ──────────────────────────────────────────────
    cmdEl.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        const val = cmdEl.value;
        cmdEl.value = '';
        await runCommand(val);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (state.historyIndex > 0) {
          state.historyIndex--;
          cmdEl.value = state.history[state.historyIndex];
        }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (state.historyIndex < state.history.length - 1) {
          state.historyIndex++;
          cmdEl.value = state.history[state.historyIndex];
        } else {
          state.historyIndex = state.history.length;
          cmdEl.value = '';
        }
      }
    });

    // Focus input when clicking anywhere, but not if the user is selecting text
    document.body.addEventListener('click', () => {
      if (!window.getSelection().toString()) cmdEl.focus();
    });

    // ── Startup banner ──────────────────────────────────────────────
    print('╔══════════════════════════════════════════╗', 'info');
    print('║          Deoxyer Terminal v1.0           ║', 'info');
    print('║  Synthetic Biology Construct Designer    ║', 'info');
    print('╚══════════════════════════════════════════╝', 'info');
    print('');
    print(`Backend: ${state.baseUrl}`, 'dim');
    print("Type 'help' for commands. Sequences are saved to your workspace.", 'dim');
    print("Use 'ws' to list saved objects, 'show <name>' to view a sequence.", 'dim');
    print('');
    refreshUI();
  </script>
</body>
</html>
