<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GenBit Terminal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #terminal {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      padding-bottom: 0;
    }
    .line { white-space: pre-wrap; word-wrap: break-word; line-height: 1.5; }
    .line.error { color: #f85149; }
    .line.success { color: #3fb950; }
    .line.info { color: #58a6ff; }
    .line.dim { color: #6e7681; }
    .line.bold { color: #f0f6fc; font-weight: bold; }
    .line.warn { color: #d29922; }
    #input-area {
      display: flex;
      align-items: center;
      padding: 8px 16px 16px;
      gap: 8px;
    }
    #input-area .prompt { color: #3fb950; font-weight: bold; white-space: nowrap; max-width: 40%; overflow: hidden; text-overflow: ellipsis; }
    #input-area input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #c9d1d9;
      font-family: inherit;
      font-size: inherit;
      caret-color: #3fb950;
    }
    #status-bar {
      display: flex;
      justify-content: space-between;
      padding: 4px 16px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      font-size: 12px;
      color: #8b949e;
      flex-shrink: 0;
    }
    #status-bar span {
      white-space: nowrap;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #status-bar .active { color: #3fb950; }
  </style>
</head>
<body>
  <div id="status-bar">
    <span id="sb-project">Project: none</span>
    <span id="sb-construct">Construct: none</span>
    <span id="sb-workspace">Workspace: 0 items</span>
  </div>
  <div id="terminal"></div>
  <div id="input-area">
    <span class="prompt">genbit&gt;</span>
    <input type="text" id="cmd" autofocus autocomplete="off" spellcheck="false">
  </div>

  <script>
    function getSessionId() {
      let sid = localStorage.getItem('genbit-session-id');
      if (!sid) {
        sid = crypto.randomUUID();
        localStorage.setItem('genbit-session-id', sid);
      }
      return sid;
    }

    const state = {
      baseUrl: 'http://localhost:8000',
      history: [],
      historyIndex: -1,
      workspace: {},
      sessionId: getSessionId(),
      activeProject: null,   // { id, name }
      activeConstruct: null,  // { id, name }
      pendingConfirm: null,  // { action: async function }
    };

    const termEl = document.getElementById('terminal');
    const cmdEl = document.getElementById('cmd');

    // ── Output helpers ──────────────────────────────────────────────
    function print(text, cls = '') {
      const div = document.createElement('div');
      div.className = 'line' + (cls ? ' ' + cls : '');
      div.textContent = text;
      termEl.appendChild(div);
      termEl.scrollTop = termEl.scrollHeight;
    }

    function printJson(obj) {
      print(JSON.stringify(obj, null, 2));
    }


    function printTable(rows, columns) {
      if (!rows || rows.length === 0) { print('No results.', 'dim'); return; }
      const widths = {};
      columns.forEach(c => widths[c] = c.length);
      rows.forEach(r => columns.forEach(c => {
        const val = String(r[c] ?? '');
        if (val.length > widths[c]) widths[c] = Math.min(val.length, 60);
      }));
      const header = columns.map(c => c.padEnd(widths[c])).join('  ');
      const sep = columns.map(c => '─'.repeat(widths[c])).join('──');
      print(header, 'bold');
      print(sep, 'dim');
      rows.forEach(r => {
        const line = columns.map(c => String(r[c] ?? '').substring(0, 60).padEnd(widths[c])).join('  ');
        print(line);
      });
    }

    function printSeq(seq, label) {
      if (label) print(label + ':', 'info');
      for (let i = 0; i < seq.length; i += 80) {
        print(seq.substring(i, i + 80));
      }
    }

    // ── UI refresh helpers ──────────────────────────────────────────
    function truncName(name, max) {
      return name.length > max ? name.substring(0, max - 1) + '…' : name;
    }

    function updateStatusBar() {
      const p = state.activeProject;
      const c = state.activeConstruct;
      const wsCount = Object.keys(state.workspace).length;
      const sbP = document.getElementById('sb-project');
      const sbC = document.getElementById('sb-construct');
      const sbW = document.getElementById('sb-workspace');
      sbP.textContent = p ? `Project: ${truncName(p.name, 20)}` : 'Project: none';
      sbP.className = p ? 'active' : '';
      sbC.textContent = c ? `Construct: ${truncName(c.name, 20)}` : 'Construct: none';
      sbC.className = c ? 'active' : '';
      sbW.textContent = `Workspace: ${wsCount} item${wsCount !== 1 ? 's' : ''}`;
    }

    function updatePrompt() {
      const parts = ['genbit'];
      if (state.activeProject) parts.push(truncName(state.activeProject.name, 20));
      if (state.activeConstruct) parts.push(truncName(state.activeConstruct.name, 20));
      document.querySelector('#input-area .prompt').textContent = parts.join('/') + '>';
    }

    function refreshUI() {
      updateStatusBar();
      updatePrompt();
    }

    // ── Workspace helpers ───────────────────────────────────────────
    function wsStore(name, obj) {
      state.workspace[name] = obj;
      refreshUI();
    }

    function wsGet(name) {
      return state.workspace[name] || null;
    }

    function wsUnit(type) {
      return (type === 'protein') ? 'aa' : 'bp';
    }

    // ── API helper ──────────────────────────────────────────────────
    async function api(method, path, body) {
      const url = state.baseUrl + path;
      const opts = { method, headers: { 'Content-Type': 'application/json', 'X-Session-ID': state.sessionId } };
      if (body) opts.body = JSON.stringify(body);
      try {
        const res = await fetch(url, opts);
        const data = await res.json().catch(() => null);
        if (!res.ok) {
          const raw = data?.detail || `HTTP ${res.status}`;
          const detail = typeof raw === 'string' ? raw : JSON.stringify(raw);
          throw new Error(detail);
        }
        return data;
      } catch (e) {
        if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
          throw new Error(`Connection failed. Is the backend running at ${state.baseUrl}?`);
        }
        throw e;
      }
    }

    // ── Command parser ──────────────────────────────────────────────
    function parseCommand(input) {
      const tokens = [];
      let current = '';
      let inQuote = false;
      let quoteChar = '';
      for (const ch of input) {
        if (inQuote) {
          if (ch === quoteChar) { inQuote = false; } else { current += ch; }
        } else if (ch === '"' || ch === "'") {
          inQuote = true; quoteChar = ch;
        } else if (ch === ' ') {
          if (current) { tokens.push(current); current = ''; }
        } else {
          current += ch;
        }
      }
      if (current) tokens.push(current);

      const args = [];
      const flags = {};
      for (const t of tokens) {
        if (t.startsWith('--')) {
          const eq = t.indexOf('=');
          if (eq > -1) {
            flags[t.substring(2, eq)] = t.substring(eq + 1);
          } else {
            flags[t.substring(2)] = true;
          }
        } else {
          args.push(t);
        }
      }
      return { args, flags };
    }

    // ── Command handlers ────────────────────────────────────────────

    async function handleHelp(args, flags) {
      const topic = args[0];
      const sections = {
        gene: [
          'gene search <query> [--organism=X]       Search NCBI Gene',
          'gene get <id>                             Get gene details',
          'gene sequence <id> [--type=cds|mrna]      Fetch & save to workspace',
          '  [--name=X] [--seq]',
        ],
        protein: [
          'protein search <query> [--organism=X]     Search UniProt/NCBI',
          'protein get <accession>                   Get protein details',
          'protein sequence <accession>              Fetch & save to workspace',
          '  [--name=X] [--seq]',
        ],
        organism: [
          'organism search <query>                   Search NCBI Taxonomy',
          'organism get <tax_id>                     Get organism details',
          'organism codons <tax_id>                  Get codon usage table',
        ],
        optimize: [
          'optimize <name|accession> --organism=<tax_id>',
          '  Accepts a workspace name or protein accession.',
          '  Auto-fetches protein if not in workspace.',
          '  Result saved as <name>-opt.',
          '  [--strategy=frequency|harmonized|balanced]',
          '  [--gc-min=0.4] [--gc-max=0.6]',
          '  [--avoid=EcoRI,BamHI] [--allow-repeats]',
          '  [--name=X] [--seq]',
        ],
        kozak: [
          'kozak <tax_id> [--start=ATG]              Generate & save Kozak',
          '  [--name=X]',
        ],
        promoter: [
          'promoter search <organism> [--gene=X]     Search promoters',
          'promoter get <id>                         Fetch & save to workspace',
          '  [--name=X]',
        ],
        project: [
          'project list                              List all projects',
          'project create <name> [--desc=X]          Create & activate project',
          'project use <id>                           Set active project',
          'project get [id]                           Get project details',
          'project update [id] [--name=X] [--desc=X]',
          'project delete [id]                        Delete project',
          '',
          '  Omit [id] to use the active project.',
        ],
        construct: [
          'construct list [--project=<id>]            List constructs in project',
          'construct create <name> [--project=<id>] [--organism=<tax_id>]',
          'construct use <id>                         Set active construct',
          'construct add [id] <workspace_name>        Add element from workspace',
          '  [--as=promoter|kozak|cds|terminator|tag|utr|custom]',
          '  [--position=N]',
          'construct get [id]                         Show construct elements',
          'construct delete [id]                      Delete construct',
          'construct assemble [id] [--seq]            Assemble full sequence',
          '',
          '  Omit [id] to use the active construct.',
        ],
        workspace: [
          'ws                                        List workspace objects',
          'ws add <name> <sequence>                   Add raw sequence to workspace',
          '  [--type=promoter|cds|terminator|custom]',
          'show <name>                               Show sequence of object',
          'show <name> --info                        Show all metadata',
          'rm <name>                                 Remove from workspace',
          'rename <old> <new>                        Rename workspace object',
        ],
      };

      if (flags && flags.json) {
        if (topic && sections[topic]) {
          printJson({ command: topic, usage: sections[topic] });
        } else {
          printJson(Object.fromEntries(Object.entries(sections).map(([k, v]) => [k, v])));
        }
        return;
      }

      if (topic && sections[topic]) {
        sections[topic].forEach(l => print(l));
        return;
      }

      print('GenBit Terminal — Synthetic Biology Construct Designer', 'bold');
      print('');
      print('Commands:', 'info');
      print('  health                     Check API status');
      Object.keys(sections).forEach(k => {
        print('');
        print('  ' + k + ':', 'info');
        sections[k].forEach(l => print('    ' + l));
      });
      print('');
      print('Utility:', 'info');
      print('  status                     Show active project & construct');
      print('  clear                      Clear terminal');
      print('  history                    Show command history');
      print('  set base-url <url>         Change backend URL');
      print('  help [command]             Show help');
      print('');
      print('Global flags:', 'info');
      print('  --json                     Output raw JSON (for agent/script use)');
      print('');
      print('Tip: Sequences are saved to the workspace, not printed.', 'dim');
      print('Use "show <name>" to view a sequence, or pass --seq to any fetch command.', 'dim');
    }

    async function handleHealth(args, flags) {
      const data = await api('GET', '/health');
      if (flags && flags.json) { printJson(data); return; }
      print(`Status:   ${data.status}`, data.status === 'ok' ? 'success' : 'warn');
      print(`Database: ${data.database}`, data.database === 'ok' ? 'success' : 'error');
      print(`Redis:    ${data.redis}`, data.redis === 'ok' ? 'success' : 'error');
    }

    async function handleGene(args, flags) {
      const verb = args[0];
      if (verb === 'search') {
        const q = args.slice(1).join(' ');
        if (!q) { print('Usage: gene search <query> [--organism=X]', 'warn'); return; }
        let path = `/api/genes/search?q=${encodeURIComponent(q)}`;
        if (flags.organism) path += `&organism=${encodeURIComponent(flags.organism)}`;
        const data = await api('GET', path);
        if (flags.json) { printJson(data); return; }
        printTable(data, ['gene_id', 'symbol', 'description', 'organism']);
      } else if (verb === 'get') {
        if (!args[1]) { print('Usage: gene get <gene_id>', 'warn'); return; }
        const data = await api('GET', `/api/genes/${args[1]}`);
        if (flags.json) { printJson(data); return; }
        printJson(data);
      } else if (verb === 'sequence') {
        if (!args[1]) { print('Usage: gene sequence <gene_id> [--type=cds|mrna] [--name=X] [--seq]', 'warn'); return; }
        const geneId = args[1];
        const seqType = flags.type || 'cds';
        let path = `/api/genes/${geneId}/sequence`;
        if (flags.type) path += `?seq_type=${flags.type}`;
        const data = await api('GET', path);

        // Auto-name: try symbol from accession or fall back to gene-{id}-{type}
        const autoName = flags.name || (data.symbol ? `${data.symbol}-${seqType}` : `gene-${geneId}-${seqType}`);
        const wsObj = {
          type: 'dna',
          sequence: data.sequence,
          length: data.length || data.sequence.length,
          source: 'ncbi-gene',
          label: `Gene ${geneId} ${seqType.toUpperCase()}`,
          accession: data.accession || null,
        };
        wsStore(autoName, wsObj);
        if (flags.json) { printJson({ workspace_name: autoName, ...wsObj }); return; }
        print(`Saved as '${autoName}' (${data.sequence.length} bp, ${seqType.toUpperCase()})`, 'success');
        if (data.accession) print(`Accession: ${data.accession}`, 'dim');
        if (flags.seq) {
          print('');
          printSeq(data.sequence);
        }
      } else {
        print('Usage: gene search|get|sequence ...', 'warn');
      }
    }

    async function handleProtein(args, flags) {
      const verb = args[0];
      if (verb === 'search') {
        const q = args.slice(1).join(' ');
        if (!q) { print('Usage: protein search <query> [--organism=X]', 'warn'); return; }
        let path = `/api/proteins/search?q=${encodeURIComponent(q)}`;
        if (flags.organism) path += `&organism=${encodeURIComponent(flags.organism)}`;
        const data = await api('GET', path);
        if (flags.json) { printJson(data); return; }
        printTable(data, ['accession', 'name', 'organism', 'length', 'source']);
      } else if (verb === 'get') {
        if (!args[1]) { print('Usage: protein get <accession>', 'warn'); return; }
        const data = await api('GET', `/api/proteins/${args[1]}`);
        if (flags.json) { printJson(data); return; }
        printJson(data);
        print(`To save sequence to workspace: protein sequence ${args[1]} --name=<name>`, 'dim');
        return;
      } else if (verb === 'sequence') {
        if (!args[1]) { print('Usage: protein sequence <accession> [--name=X] [--seq]', 'warn'); return; }
        const accession = args[1];
        const data = await api('GET', `/api/proteins/${accession}/sequence`);

        const name = flags.name || accession;
        const wsObj = {
          type: 'protein',
          sequence: data.sequence,
          length: data.length || data.sequence.length,
          source: data.source || 'uniprot',
          label: data.name || accession,
          accession: data.accession || accession,
        };
        wsStore(name, wsObj);
        if (flags.json) { printJson({ workspace_name: name, ...wsObj }); return; }
        const labelPart = data.name ? `, ${data.name}` : '';
        print(`Saved as '${name}' (${data.sequence.length} aa${labelPart})`, 'success');
        if (flags.seq) {
          print('');
          printSeq(data.sequence);
        }
      } else {
        print('Usage: protein search|get|sequence ...', 'warn');
      }
    }

    async function handleOrganism(args, flags) {
      const verb = args[0];
      if (verb === 'search') {
        const q = args.slice(1).join(' ');
        if (!q) { print('Usage: organism search <query>', 'warn'); return; }
        const data = await api('GET', `/api/organisms/search?q=${encodeURIComponent(q)}`);
        if (flags.json) { printJson(data); return; }
        printTable(data, ['tax_id', 'scientific_name', 'common_name']);
      } else if (verb === 'get') {
        if (!args[1]) { print('Usage: organism get <tax_id>', 'warn'); return; }
        const data = await api('GET', `/api/organisms/${args[1]}`);
        if (flags.json) { printJson(data); return; }
        printJson(data);
        return;
      } else if (verb === 'codons') {
        if (!args[1]) { print('Usage: organism codons <tax_id>', 'warn'); return; }
        const data = await api('GET', `/api/organisms/${args[1]}/codon-table`);
        if (flags.json) { printJson(data); return; }
        print(`Organism tax_id: ${data.organism_tax_id}  Source: ${data.source}`, 'info');
        print('');
        for (const [aa, codons] of Object.entries(data.table)) {
          const codonStr = Object.entries(codons).map(([c, f]) => `${c}: ${Number(f).toFixed(3)}`).join('  ');
          print(`  ${aa.padEnd(4)} ${codonStr}`);
        }
      } else {
        print('Usage: organism search|get|codons ...', 'warn');
      }
    }

    async function handleOptimize(args, flags) {
      const ref = args[0];
      if (!ref || !flags.organism) {
        print('Usage: optimize <name|accession> --organism=<tax_id>', 'warn');
        print('');
        print('Required:', 'info');
        print('  <name|accession>     Workspace name or UniProt accession (e.g. P04637)');
        print('  --organism=<tax_id>  Target organism tax ID (e.g. 9606=human, 4932=yeast)');
        print('');
        print('Optional:', 'info');
        print('  --strategy=<s>       Optimization strategy:');
        print('      frequency    Most-used codons in target organism (default, good general choice)');
        print('      harmonized   Matches codon usage ratios from source organism');
        print('      balanced     Balances frequency with secondary structure avoidance');
        print('  --gc-min=<0-1>       Minimum GC content (typical: 0.3–0.4)');
        print('  --gc-max=<0-1>       Maximum GC content (typical: 0.6–0.7)');
        print('  --avoid=<sites>      Restriction sites to avoid, comma-separated');
        print('                       Common: EcoRI,BamHI,HindIII,NotI,XhoI');
        print('  --allow-repeats      Allow sequence repeats (default: repeats are removed)');
        print('  --name=<X>           Custom name for result (default: <input>-opt)');
        print('  --seq                Print the optimized sequence');
        print('');
        print('Example: optimize P04637 --organism=9606 --strategy=frequency --avoid=EcoRI,BamHI', 'dim');
        return;
      }

      // Resolve the protein sequence
      let proteinSeq = null;
      let sourceName = ref;

      const wsObj = wsGet(ref);
      if (wsObj) {
        if (wsObj.type !== 'protein') {
          print(`'${ref}' is a ${wsObj.type} sequence, not a protein. Optimization requires a protein sequence.`, 'error');
          return;
        }
        proteinSeq = wsObj.sequence;
        print(`Using '${ref}' from workspace (${wsObj.length} aa)`, 'dim');
      } else {
        // Try fetching as a protein accession
        print(`'${ref}' not in workspace. Fetching protein sequence...`, 'dim');
        try {
          const data = await api('GET', `/api/proteins/${ref}/sequence`);
          proteinSeq = data.sequence;
          // Also store the protein in workspace
          wsStore(ref, {
            type: 'protein',
            sequence: data.sequence,
            length: data.sequence.length,
            source: data.source || 'uniprot',
            label: data.name || ref,
            accession: data.accession || ref,
          });
          print(`Fetched and saved protein as '${ref}' (${data.sequence.length} aa)`, 'success');
        } catch (e) {
          print(`Could not fetch protein '${ref}': ${e.message}`, 'error');
          print('Provide a workspace name or valid protein accession.', 'dim');
          return;
        }
      }

      const body = {
        sequence: proteinSeq,
        organism_tax_id: parseInt(flags.organism),
        strategy: flags.strategy || 'frequency',
        avoid_restriction_sites: flags.avoid ? flags.avoid.split(',') : [],
        avoid_repeats: flags['allow-repeats'] !== undefined ? false : true,
      };
      if (flags['gc-min']) body.target_gc_min = parseFloat(flags['gc-min']);
      if (flags['gc-max']) body.target_gc_max = parseFloat(flags['gc-max']);

      print('Optimizing...', 'dim');
      const data = await api('POST', '/api/optimization/optimize', body);

      const resultName = flags.name || `${sourceName}-opt`;
      const optSeq = data.optimized_sequence || '';
      const optObj = {
        type: 'dna',
        sequence: optSeq,
        length: optSeq.length,
        source: 'optimized',
        label: `${sourceName} optimized for ${flags.organism}`,
        cai_before: data.cai_before,
        cai_after: data.cai_after,
        gc_content: data.gc_content,
        job_id: data.job_id,
      };
      wsStore(resultName, optObj);

      if (flags.json) { printJson({ workspace_name: resultName, ...optObj, ...data }); return; }

      let summary = `Saved as '${resultName}' (${optSeq.length} bp`;
      if (data.cai_before != null) summary += `, CAI: ${data.cai_before} → ${data.cai_after}`;
      if (data.gc_content != null) summary += `, GC: ${(data.gc_content * 100).toFixed(1)}%`;
      summary += ')';
      print(summary, 'success');

      if (flags.seq && optSeq) {
        print('');
        printSeq(optSeq);
      }
    }

    async function handleKozak(args, flags) {
      const taxId = args[0];
      if (!taxId) { print('Usage: kozak <tax_id> [--start=ATG] [--name=X]', 'warn'); return; }
      const body = {
        organism_tax_id: parseInt(taxId),
        start_codon: flags.start || 'ATG',
      };
      const data = await api('POST', '/api/regulatory/kozak', body);

      const name = flags.name || `kozak-${taxId}`;
      const kozakObj = {
        type: 'kozak',
        sequence: data.sequence,
        length: data.sequence.length,
        source: 'generated',
        label: `${data.organism} Kozak`,
        consensus: data.consensus,
        notes: data.notes || null,
      };
      wsStore(name, kozakObj);
      if (flags.json) { printJson({ workspace_name: name, ...kozakObj }); return; }
      // Kozak sequences are short enough to show inline
      print(`Saved as '${name}' (${data.sequence.length} bp, ${data.organism}: ${data.sequence})`, 'success');
      if (data.notes) print(`Notes: ${data.notes}`, 'dim');
    }

    async function handlePromoter(args, flags) {
      const verb = args[0];
      if (verb === 'search') {
        const org = flags.organism || args.slice(1).join(' ');
        if (!org) { print('Usage: promoter search <organism> [--organism=X] [--gene=X]', 'warn'); return; }
        let path = `/api/regulatory/promoters/search?organism=${encodeURIComponent(org)}`;
        if (flags.gene) path += `&gene=${encodeURIComponent(flags.gene)}`;
        const data = await api('GET', path);
        if (flags.json) { printJson(data); return; }
        print(`Found ${data.total} promoter(s)`, 'info');
        printTable(data.promoters, ['id', 'name', 'organism', 'strength', 'description']);
      } else if (verb === 'get') {
        if (!args[1]) { print('Usage: promoter get <promoter_id> [--name=X]', 'warn'); return; }
        const data = await api('GET', `/api/regulatory/promoters/${args[1]}`);
        if (flags.json) { printJson(data); return; }

        const name = flags.name || data.name || args[1];
        wsStore(name, {
          type: 'promoter',
          sequence: data.sequence || '',
          length: data.length || (data.sequence ? data.sequence.length : 0),
          source: 'promoter-db',
          label: data.description || data.name || args[1],
          strength: data.strength || null,
          organism: data.organism || null,
        });
        const desc = data.description ? `, ${data.description}` : '';
        const len = data.length || (data.sequence ? data.sequence.length : 0);
        print(`Saved as '${name}' (${len} bp${desc})`, 'success');
      } else {
        print('Usage: promoter search|get ...', 'warn');
      }
    }

    async function handleProject(args, flags) {
      const verb = args[0];
      if (verb === 'list') {
        const data = await api('GET', '/api/projects/');
        if (flags.json) { printJson(data); return; }
        const rows = data.map(p => ({
          ...p,
          active: state.activeProject && state.activeProject.id === p.id ? '→' : '',
        }));
        printTable(rows, ['active', 'id', 'name', 'description', 'created_at']);
      } else if (verb === 'create') {
        const name = args.slice(1).join(' ');
        if (!name) { print('Usage: project create <name> [--desc=X]', 'warn'); return; }
        const body = { name, description: flags.desc || null };
        const data = await api('POST', '/api/projects/', body);
        state.activeProject = { id: data.id, name: data.name };
        refreshUI();
        if (flags.json) { printJson(data); return; }
        print(`Created project: ${data.id}`, 'success');
        print(`Name: ${data.name}`, 'info');
        if (data.description) print(`Description: ${data.description}`, 'dim');
        print(`Active project set to '${data.name}'`, 'dim');
      } else if (verb === 'use') {
        if (!args[1]) { print('Usage: project use <id>', 'warn'); return; }
        const data = await api('GET', `/api/projects/${args[1]}`);
        state.activeProject = { id: data.id, name: data.name };
        refreshUI();
        if (flags.json) { printJson({ active_project: state.activeProject }); return; }
        print(`Active project: ${data.name} (${data.id})`, 'success');
      } else if (verb === 'get') {
        const id = args[1] || (state.activeProject && state.activeProject.id);
        if (!id) { print('Usage: project get [id] — or set active with "project use <id>"', 'warn'); return; }
        const data = await api('GET', `/api/projects/${id}`);
        if (flags.json) { printJson(data); return; }
        print(`Project: ${data.name}`, 'info');
        print(`ID: ${data.id}`, 'dim');
        if (data.description) print(`Description: ${data.description}`);
        print(`Created: ${data.created_at}`, 'dim');
        if (data.constructs && data.constructs.length) {
          print('');
          print('Constructs:', 'info');
          printTable(data.constructs, ['id', 'name', 'organism_tax_id', 'updated_at']);
        }
      } else if (verb === 'update') {
        const id = args[1] || (state.activeProject && state.activeProject.id);
        if (!id) { print('Usage: project update [id] [--name=X] [--desc=X]', 'warn'); return; }
        const body = {};
        if (flags.name) body.name = flags.name;
        if (flags.desc) body.description = flags.desc;
        const data = await api('PUT', `/api/projects/${id}`, body);
        print('Updated.', 'success');
      } else if (verb === 'delete') {
        const id = args[1] || (state.activeProject && state.activeProject.id);
        if (!id) { print('Usage: project delete [id]', 'warn'); return; }
        const name = (state.activeProject && state.activeProject.id === id) ? state.activeProject.name : id;
        print(`Delete project '${name}'? This cannot be undone. (y/n)`, 'warn');
        state.pendingConfirm = {
          action: async () => {
            await api('DELETE', `/api/projects/${id}`);
            if (state.activeProject && state.activeProject.id === id) state.activeProject = null;
            refreshUI();
            print('Deleted.', 'success');
          }
        };
      } else {
        print('Usage: project list|create|use|get|update|delete ...', 'warn');
      }
    }

    function printConstructElements(data) {
      if (data.elements && data.elements.length) {
        print('');
        print('Current elements:', 'info');
        const rows = data.elements
          .sort((a, b) => a.position - b.position)
          .map(el => ({
            position: el.position,
            label: el.label,
            type: el.element_type,
            length: el.sequence ? `${el.sequence.length} bp` : '—',
          }));
        printTable(rows, ['position', 'label', 'type', 'length']);
      }
    }

    async function handleConstruct(args, flags) {
      const verb = args[0];
      if (verb === 'list') {
        const projectId = flags.project || (state.activeProject && state.activeProject.id);
        if (!projectId) {
          print('Usage: construct list [--project=<id>] — or set active with "project use <id>"', 'warn');
          return;
        }
        const data = await api('GET', `/api/constructs/?project_id=${encodeURIComponent(projectId)}`);
        if (flags.json) { printJson(data); return; }
        if (!data.length) {
          print('No constructs in this project.', 'dim');
          return;
        }
        const rows = data.map(c => ({
          active: state.activeConstruct && state.activeConstruct.id === c.id ? '→' : '',
          id: c.id,
          name: c.name,
          organism: c.organism_tax_id || '—',
          elements: c.elements ? c.elements.length : 0,
          created_at: c.created_at,
        }));
        printTable(rows, ['active', 'id', 'name', 'organism', 'elements', 'created_at']);
      } else if (verb === 'create') {
        const name = args.slice(1).join(' ');
        const projectId = flags.project || (state.activeProject && state.activeProject.id);
        if (!name || !projectId) {
          print('Usage: construct create <name> [--project=<id>] [--organism=<tax_id>]', 'warn');
          if (!projectId) print('No active project. Use "project use <id>" or pass --project=<id>.', 'dim');
          return;
        }
        const body = {
          project_id: projectId,
          name: name,
          organism_tax_id: flags.organism ? parseInt(flags.organism) : null,
          elements: [],
        };
        const data = await api('POST', '/api/constructs/', body);
        state.activeConstruct = { id: data.id, name: data.name };
        refreshUI();
        if (flags.json) { printJson(data); return; }
        print(`Created construct: ${data.id}`, 'success');
        print(`Name: ${data.name}`, 'info');
        print(`Active construct set to '${data.name}'`, 'dim');
        print(`Next: construct add <workspace_name> --as=cds|promoter|...`, 'dim');
      } else if (verb === 'use') {
        if (!args[1]) { print('Usage: construct use <id>', 'warn'); return; }
        const data = await api('GET', `/api/constructs/${args[1]}`);
        state.activeConstruct = { id: data.id, name: data.name };
        refreshUI();
        if (flags.json) { printJson({ active_construct: state.activeConstruct }); return; }
        print(`Active construct: ${data.name} (${data.id})`, 'success');
      } else if (verb === 'add') {
        // If only one arg after 'add', treat it as wsName using active construct
        let constructId, wsName;
        if (args[2]) {
          constructId = args[1];
          wsName = args[2];
        } else if (args[1]) {
          constructId = state.activeConstruct && state.activeConstruct.id;
          wsName = args[1];
        }
        if (!constructId || !wsName) {
          print('Usage: construct add [construct_id] <workspace_name> [--as=type] [--position=N]', 'warn');
          if (!constructId) print('No active construct. Use "construct use <id>" or pass the construct ID.', 'dim');
          return;
        }
        const wsObj = wsGet(wsName);
        if (!wsObj) {
          print(`'${wsName}' not found in workspace. Use 'ws' to list available objects.`, 'error');
          return;
        }

        // Infer element type from workspace object type, or use --as override
        const typeMap = {
          'promoter': 'promoter',
          'kozak': 'kozak',
          'dna': 'cds',
          'protein': 'cds',
        };
        const elementType = flags.as || typeMap[wsObj.type] || 'custom';

        // Fetch current construct to determine next position and existing elements
        const current = await api('GET', `/api/constructs/${constructId}`);
        const existingElements = current.elements || [];
        const nextPos = flags.position != null ? parseInt(flags.position) : existingElements.length;

        // Build updated element list
        const newElement = {
          element_type: elementType,
          label: wsName,
          sequence: wsObj.sequence,
          position: nextPos,
        };

        // If inserting at a specific position, shift existing elements
        const updatedElements = existingElements.map(el => ({
          element_type: el.element_type,
          label: el.label,
          sequence: el.sequence,
          position: el.position >= nextPos ? el.position + 1 : el.position,
        }));
        updatedElements.push(newElement);
        updatedElements.sort((a, b) => a.position - b.position);

        await api('PUT', `/api/constructs/${constructId}`, { elements: updatedElements });
        if (flags.json) {
          const freshJson = await api('GET', `/api/constructs/${constructId}`);
          printJson(freshJson);
          return;
        }
        print(`Added '${wsName}' as ${elementType} at position ${nextPos} (${wsObj.length} ${wsUnit(wsObj.type)})`, 'success');
        const fresh = await api('GET', `/api/constructs/${constructId}`);
        printConstructElements(fresh);

      } else if (verb === 'get') {
        const id = args[1] || (state.activeConstruct && state.activeConstruct.id);
        if (!id) { print('Usage: construct get [id] — or set active with "construct use <id>"', 'warn'); return; }
        const data = await api('GET', `/api/constructs/${id}`);
        if (flags.json) { printJson(data); return; }
        print(`Construct: ${data.name}`, 'info');
        print(`ID: ${data.id}`, 'dim');
        if (data.organism_tax_id) print(`Organism: ${data.organism_tax_id}`);
        if (data.elements && data.elements.length) {
          printConstructElements(data);
        } else {
          print('No elements yet. Use "construct add <workspace_name>" to add elements.', 'dim');
        }
      } else if (verb === 'delete') {
        const id = args[1] || (state.activeConstruct && state.activeConstruct.id);
        if (!id) { print('Usage: construct delete [id]', 'warn'); return; }
        const name = (state.activeConstruct && state.activeConstruct.id === id) ? state.activeConstruct.name : id;
        print(`Delete construct '${name}'? This cannot be undone. (y/n)`, 'warn');
        state.pendingConfirm = {
          action: async () => {
            await api('DELETE', `/api/constructs/${id}`);
            if (state.activeConstruct && state.activeConstruct.id === id) state.activeConstruct = null;
            refreshUI();
            print('Deleted.', 'success');
          }
        };
      } else if (verb === 'assemble') {
        const id = args[1] || (state.activeConstruct && state.activeConstruct.id);
        if (!id) { print('Usage: construct assemble [id] [--seq]', 'warn'); return; }
        const data = await api('POST', `/api/constructs/${id}/assemble`);
        if (flags.json) { printJson(data); return; }
        if (data.full_sequence) {
          print(`Total length: ${data.full_sequence.length} bp`, 'info');
        }
        if (data.annotations && data.annotations.length) {
          print('');
          print('Annotations:', 'info');
          printTable(data.annotations, ['label', 'type', 'start', 'end', 'length']);
        }
        if (data.warnings && data.warnings.length) {
          print('');
          data.warnings.forEach(w => print('Warning: ' + w, 'warn'));
        }
        if (flags.seq && data.full_sequence) {
          print('');
          printSeq(data.full_sequence, 'Assembled sequence');
        }
      } else {
        print('Usage: construct list|create|add|get|delete|assemble ...', 'warn');
      }
    }

    // ── Workspace commands ──────────────────────────────────────────
    function handleWorkspace(args, flags) {
      // ws add <name> <sequence> [--type=X]
      if (args[0] === 'add') {
        const name = args[1];
        const seq = args.slice(2).join('');
        if (!name || !seq) {
          print('Usage: ws add <name> <sequence> [--type=promoter|cds|terminator|custom]', 'warn');
          return;
        }
        if (!/^[ATCGatcg]+$/.test(seq)) {
          print('Sequence must contain only A, T, C, G characters.', 'error');
          return;
        }
        const seqType = flags.type || 'custom';
        wsStore(name, {
          type: seqType === 'cds' || seqType === 'promoter' || seqType === 'terminator' ? seqType : 'dna',
          sequence: seq.toUpperCase(),
          length: seq.length,
          source: 'manual',
          label: name,
        });
        print(`Saved '${name}' as ${seqType} (${seq.length} bp)`, 'success');
        return;
      }

      const entries = Object.entries(state.workspace);
      if (flags && flags.json) {
        printJson(Object.fromEntries(entries.map(([name, obj]) => [name, { type: obj.type, length: obj.length, label: obj.label || '' }])));
        return;
      }
      if (entries.length === 0) {
        print('Workspace is empty.', 'dim');
        print('Fetch sequences with gene/protein/optimize/kozak/promoter commands,', 'dim');
        print('or use "ws add <name> <sequence>" to add a raw sequence.', 'dim');
        return;
      }
      const rows = entries.map(([name, obj]) => ({
        name,
        type: obj.type,
        length: `${obj.length} ${wsUnit(obj.type)}`,
        label: obj.label || '',
      }));
      printTable(rows, ['name', 'type', 'length', 'label']);
    }

    function handleShow(args, flags) {
      const name = args[0];
      if (!name) { print('Usage: show <name> [--info]', 'warn'); return; }
      const obj = wsGet(name);
      if (!obj) {
        print(`'${name}' not found in workspace. Use 'ws' to list available objects.`, 'error');
        return;
      }
      if (flags.json) {
        printJson({ workspace_name: name, ...obj });
        return;
      }
      if (flags.info) {
        print(`Name:     ${name}`, 'info');
        print(`Type:     ${obj.type}`);
        print(`Length:   ${obj.length} ${wsUnit(obj.type)}`);
        print(`Source:   ${obj.source}`);
        if (obj.label) print(`Label:    ${obj.label}`);
        if (obj.accession) print(`Accession: ${obj.accession}`);
        if (obj.cai_before != null) print(`CAI:      ${obj.cai_before} → ${obj.cai_after}`);
        if (obj.gc_content != null) print(`GC:       ${(obj.gc_content * 100).toFixed(1)}%`);
        if (obj.consensus) print(`Consensus: ${obj.consensus}`);
        if (obj.strength) print(`Strength: ${obj.strength}`);
        if (obj.notes) print(`Notes:    ${obj.notes}`);
        print('');
        printSeq(obj.sequence);
      } else {
        print(`${name} (${obj.length} ${wsUnit(obj.type)}, ${obj.type}):`, 'info');
        printSeq(obj.sequence);
      }
    }

    function handleRm(args) {
      const name = args[0];
      if (!name) { print('Usage: rm <name>', 'warn'); return; }
      if (!wsGet(name)) {
        print(`'${name}' not found in workspace.`, 'error');
        return;
      }
      delete state.workspace[name];
      print(`Removed '${name}' from workspace.`, 'success');
      refreshUI();
    }

    function handleRename(args) {
      const [oldName, newName] = args;
      if (!oldName || !newName) { print('Usage: rename <old> <new>', 'warn'); return; }
      if (!wsGet(oldName)) {
        print(`'${oldName}' not found in workspace.`, 'error');
        return;
      }
      if (wsGet(newName)) {
        print(`'${newName}' already exists in workspace. Remove it first or choose a different name.`, 'error');
        return;
      }
      state.workspace[newName] = state.workspace[oldName];
      delete state.workspace[oldName];
      print(`Renamed '${oldName}' → '${newName}'`, 'success');
      refreshUI();
    }

    // ── Command dispatch ────────────────────────────────────────────
    const commands = {
      help: (a, f) => handleHelp(a, f),
      health: (a, f) => handleHealth(a, f),
      gene: handleGene,
      protein: handleProtein,
      organism: handleOrganism,
      optimize: handleOptimize,
      kozak: handleKozak,
      promoter: handlePromoter,
      project: handleProject,
      construct: handleConstruct,
      ws: (a, f) => handleWorkspace(a, f),
      workspace: (a, f) => handleWorkspace(a, f),
      show: handleShow,
      rm: handleRm,
      rename: handleRename,
      status: (a, f) => {
        const p = state.activeProject;
        const c = state.activeConstruct;
        if (f && f.json) { printJson({ active_project: p, active_construct: c }); return; }
        print(`Project:   ${p ? p.name + ' (' + p.id + ')' : 'none'}`, p ? 'info' : 'dim');
        print(`Construct: ${c ? c.name + ' (' + c.id + ')' : 'none'}`, c ? 'info' : 'dim');
      },
      clear: () => { termEl.innerHTML = ''; },
      history: () => { state.history.forEach((h, i) => print(`  ${i + 1}  ${h}`)); },
      set: (args) => {
        if (args[0] === 'base-url' && args[1]) {
          state.baseUrl = args[1];
          print(`Backend URL set to ${state.baseUrl}`, 'success');
        } else {
          print('Usage: set base-url <url>', 'warn');
        }
      },
    };

    async function runCommand(input) {
      const trimmed = input.trim();
      if (!trimmed) return;

      // Handle pending confirmation (y/n for destructive actions)
      if (state.pendingConfirm) {
        const pending = state.pendingConfirm;
        state.pendingConfirm = null;
        print(`> ${trimmed}`, 'dim');
        if (trimmed.toLowerCase() === 'y' || trimmed.toLowerCase() === 'yes') {
          try { await pending.action(); } catch (e) { print(`ERROR: ${e.message}`, 'error'); }
        } else {
          print('Cancelled.', 'dim');
        }
        print('');
        return;
      }

      state.history.push(trimmed);
      state.historyIndex = state.history.length;

      print(`${document.querySelector('#input-area .prompt').textContent} ${trimmed}`, 'dim');

      const { args, flags } = parseCommand(trimmed);
      if (args.length === 0) return;

      const cmd = args[0].toLowerCase();
      const handler = commands[cmd];

      if (!handler) {
        print(`Unknown command: ${cmd}. Type 'help' for available commands.`, 'error');
        return;
      }

      try {
        await handler(args.slice(1), flags);
      } catch (e) {
        if (flags.json) {
          printJson({ error: e.message, command: trimmed });
        } else {
          print(`ERROR: ${e.message}`, 'error');
        }
      }
      print('');
    }

    // ── Input handling ──────────────────────────────────────────────
    cmdEl.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter') {
        const val = cmdEl.value;
        cmdEl.value = '';
        await runCommand(val);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (state.historyIndex > 0) {
          state.historyIndex--;
          cmdEl.value = state.history[state.historyIndex];
        }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (state.historyIndex < state.history.length - 1) {
          state.historyIndex++;
          cmdEl.value = state.history[state.historyIndex];
        } else {
          state.historyIndex = state.history.length;
          cmdEl.value = '';
        }
      }
    });

    // Focus input when clicking anywhere, but not if the user is selecting text
    document.body.addEventListener('click', () => {
      if (!window.getSelection().toString()) cmdEl.focus();
    });

    // ── Startup banner ──────────────────────────────────────────────
    print('╔══════════════════════════════════════════╗', 'info');
    print('║          GenBit Terminal v0.2            ║', 'info');
    print('║  Synthetic Biology Construct Designer    ║', 'info');
    print('╚══════════════════════════════════════════╝', 'info');
    print('');
    print(`Backend: ${state.baseUrl}`, 'dim');
    print("Type 'help' for commands. Sequences are saved to your workspace.", 'dim');
    print("Use 'ws' to list saved objects, 'show <name>' to view a sequence.", 'dim');
    print('');
    refreshUI();
  </script>
</body>
</html>
